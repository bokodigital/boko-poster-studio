<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boko Digital - Content Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--lime:#BFFC00;--black:#000;--white:#FFF;--bg:#F8F9FC;--text:#101316;--muted:#5b6470;--line:#e4e7ee;--panel:#ffffff;--panel2:#ffffff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--text);}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 22px;border-bottom:1px solid var(--line);background:#ffffff;position:sticky;top:0;z-index:20;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{height:28px}
  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .topcount{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--text)}
  .pill b{color:#5a7a00}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;flex-wrap:wrap}
  .toolbar h1{font-size:18px;margin:0;font-weight:700}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line);background:#fff;padding:6px 12px;border-radius:999px;cursor:pointer}
  .chip.on{background:var(--lime);color:#000;border-color:var(--lime)}
  .newbtn{font-family:inherit;font-weight:700;font-size:12px;border:1px solid var(--lime);background:var(--lime);color:#000;padding:7px 14px;border-radius:999px;cursor:pointer}
  .newbtn:hover{filter:brightness(.96)}
  .board{display:flex;gap:14px;padding:6px 22px 30px;overflow-x:auto;align-items:flex-start;min-height:60vh}
  .col{flex:0 0 300px;background:#eef0f5;border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;max-height:82vh}
  .col.drag{border-color:var(--lime);box-shadow:0 0 0 2px var(--lime) inset}
  .col h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:0;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);color:#3a4048}
  .col h2 .n{color:var(--muted);font-weight:600}
  .col .cards{padding:11px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
  .card{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;box-shadow:0 1px 2px rgba(16,19,22,.04)}
  .card:hover{border-color:#c7ccd6;box-shadow:0 4px 14px rgba(16,19,22,.08)}
  .card.dragging{opacity:.5}
  .thumb{background:#000;display:block}
  .thumb canvas{width:100%;height:auto;display:block}
  .cbody{padding:10px 11px 11px;display:flex;flex-direction:column;gap:7px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:6px;text-transform:uppercase}
  .badge.type{background:#e7f0fb;color:#1f6aa8}
  .badge.ig{background:#fce6f1;color:#c2186e}
  .badge.li{background:#e6eefc;color:#2456b8}
  .badge.fb{background:#e8ebfb;color:#2a3fa8}
  .badge.date{background:#eef0f5;color:#3a4048}
  .badge.date.od{background:#fdecea;color:#c0392b}
  .ctitle{font-size:13.5px;font-weight:600;line-height:1.3;color:var(--text)}
  .pillar{font-size:11px;color:var(--muted)}
  .cact{display:flex;gap:6px;margin-top:3px}
  .mini{font-family:inherit;font-size:11px;font-weight:600;border-radius:7px;padding:6px 9px;cursor:pointer;border:1px solid var(--line);background:#f3f5f9;color:var(--text)}
  .mini.ok{background:var(--lime);color:#000;border-color:var(--lime)}
  .mini.warn{color:#9a6a00;border-color:#f0d488;background:#fff7e3}
  .note{font-size:11px;color:#8a6a00;background:#fff7e3;border:1px solid #f0d488;border-radius:7px;padding:6px 8px}
  .overlay{position:fixed;inset:0;background:rgba(16,19,22,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border:1px solid var(--line);border-radius:16px;width:min(900px,96vw);max-height:92vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:0;box-shadow:0 20px 60px rgba(16,19,22,.25)}
  @media(max-width:760px){.modal{grid-template-columns:1fr}}
  .mprev{background:#eef0f5;padding:18px;display:flex;align-items:flex-start;justify-content:center;border-right:1px solid var(--line)}
  .mprev canvas{width:100%;max-width:360px;height:auto;border-radius:10px;box-shadow:0 10px 34px rgba(16,19,22,.2)}
  .mform{padding:18px;display:flex;flex-direction:column;gap:11px}
  .mform h3{margin:0;font-size:15px}
  label.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
  input.f,textarea.f,select.f{width:100%;background:#fff;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 10px;font-family:inherit;font-size:13px}
  textarea.f{resize:vertical;min-height:90px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seg{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .seg button{background:transparent;color:var(--muted);border:0;padding:6px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--lime);color:#000}
  .mactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;border-top:1px solid var(--line);padding-top:12px}
  .btn{font-family:inherit;font-weight:600;font-size:13px;border-radius:9px;padding:9px 13px;cursor:pointer;border:1px solid var(--line);background:#f3f5f9;color:var(--text)}
  .btn.lime{background:var(--lime);color:#000;border-color:var(--lime)}
  .btn.warn{color:#9a6a00;border-color:#f0d488;background:#fff7e3}
  .btn.ghost{background:#fff}
  .btn:hover{filter:brightness(.98)}
  .period{display:flex;align-items:center;gap:8px}
  .period h1{font-size:18px;margin:0;font-weight:700;min-width:150px;text-align:center}
  .navbtn{font-family:inherit;font-weight:700;font-size:14px;border:1px solid var(--line);background:#fff;color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer}
  .navbtn:hover{background:#eef0f5}
  .wsel{font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:8px;padding:6px 8px;cursor:pointer}
  .rightbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .fdiv{width:1px;height:20px;background:var(--line)}
  .badge.yt{background:#fde7e7;color:#c0202a}
  .badge.hs{background:#ffeede;color:#c2640f}
  .ethumb{width:100%;aspect-ratio:1/1;background:#fff;display:flex;flex-direction:column;padding:14px;gap:6px;overflow:hidden;border-bottom:1px solid var(--line)}
  .ethumb .elabel{align-self:flex-start;font-size:9px;font-weight:700;background:#ffeede;color:#c2640f;padding:2px 6px;border-radius:5px;text-transform:uppercase}
  .ethumb .esub{font-size:13px;font-weight:700;color:#101316;line-height:1.3}
  .ethumb .eprev{font-size:11px;color:#5b6470}
  .ethumb .ebody{font-size:11px;color:#3a4048;line-height:1.45;flex:1;overflow:hidden}
  .ethumb .esig{font-size:9px;color:#8a8f98;border-top:1px solid var(--line);padding-top:5px}
  .vthumb{position:relative;width:100%;aspect-ratio:1/1;background:#0c0e10;display:flex;align-items:center;justify-content:center}
  .vthumb .play{width:52px;height:52px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center}
  .vthumb .play:after{content:"";border-left:17px solid #000;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
  .vthumb .vlabel{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;letter-spacing:.05em;color:#fff;background:rgba(255,255,255,.14);padding:3px 7px;border-radius:6px;text-transform:uppercase}
  .vthumb .vtitle{position:absolute;bottom:10px;left:12px;right:12px;font-size:13px;font-weight:600;color:#fff;line-height:1.25;z-index:1}
  .vthumb .vvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .vthumb .vpub{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;background:var(--lime);color:#000;padding:4px 8px;border-radius:6px;text-decoration:none;z-index:2}
  .vthumb a.play{cursor:pointer;text-decoration:none;z-index:2}
  .vplaywrap{position:relative;width:100%;padding-top:100%;border-radius:10px;overflow:hidden;background:#000}
  .vplaywrap iframe,.vplaywrap video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vplayfile{width:100%;border-radius:10px;background:#000;display:block}
  .vnote2{font-size:12px;color:#8a6a00;background:#fff7e3;border:1px solid #f0d488;border-radius:8px;padding:8px 10px;margin-top:8px}
  .vnote{font-size:12px;color:#5b6470;background:#f3f5f9;border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .gate{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:100}
  .gate.show{display:flex}
  .gatecard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;width:min(360px,92vw);box-shadow:0 20px 60px rgba(16,19,22,.18);text-align:center}
  .gatecard img{height:30px;margin-bottom:14px}
  .gatecard h3{margin:0 0 14px;font-size:16px}
  .gatecard input{width:100%;background:#fff;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-family:inherit;font-size:14px;margin-bottom:10px}
  .gatecard button{width:100%;justify-content:center}
  .gerr{color:#c0392b;font-size:12px;min-height:16px;margin-bottom:8px}
  .offbanner{display:none;position:fixed;bottom:14px;left:14px;background:#fff7e3;color:#8a6a00;border:1px solid #f0d488;border-radius:10px;padding:8px 12px;font-size:12px;z-index:40}
  .syncdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#cfd3d8;margin-left:8px;vertical-align:middle}
  .syncdot.on{background:#3fb950}
  .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:20px;cursor:pointer}
</style>
</head>
<body>
<header class="app">
  <div class="brand"><img id="logo" alt="Boko Digital"><span class="sub">Content Command Center</span></div>
  <div class="topcount">
    <span class="pill">Total <b id="cTotal">0</b></span>
    <span class="pill">Needs review <b id="cReview">0</b></span>
    <span class="pill">Approved <b id="cApproved">0</b></span><span class="syncdot" id="syncdot" title="Cloud sync"></span>
  </div>
</header>
<div class="toolbar">
  <div class="period">
    <button class="navbtn" id="prevM">&#9664;</button>
    <h1 id="monthLabel">Month</h1>
    <button class="navbtn" id="nextM">&#9654;</button>
    <select class="wsel" id="weekSel"></select>
  </div>
  <div class="rightbar">
    <div class="filters" id="typefilters"></div>
    <span class="fdiv"></span>
    <div class="filters" id="filters"></div>
    <button id="newBtn" class="newbtn">+ Post</button>
    <button id="newVid" class="newbtn">+ Video</button>
  </div>
</div>
<div class="board" id="board"></div>

<div class="gate" id="gate"><div class="gatecard">
  <img id="glogo" alt="Boko Digital">
  <h3>Enter passcode</h3>
  <input id="gpass" type="password" placeholder="Passcode" autocomplete="off">
  <div class="gerr" id="gerr"></div>
  <button class="btn lime" id="gbtn">Open board</button>
</div></div>
<div class="offbanner" id="offbanner">Working offline on this device — cloud sync not set up yet.</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

title": "We built a sales machine for a consultancy that was burning hours on manual LinkedIn outre", "pillar": "Macroplan Post", "template": "card", "ratio": "square", "headline": "We built a sales machine for a consultancy that was burning ", "accent": "", "cta": "DM US", "eyebrow": "Maria", "bullets": [], "caption": "Osad a Lab had a strong methodology, real results for their clients, and a clear target audience. What they didn't have: a way to reach that audience without someone spending hours every day doing it manually. Here's what we built. Their team was tracking every LinkedIn connection by hand. Every follow-up. Every reply. No pipeline. No data on what was working. Just spreadsheets and gut feel. Great service. Completely unsustainable outreach. We replaced the manual process with a system. AimFox now runs targeted outreach to 250+ senior HR contacts timed to business hours, A/B tested across two m", "owner": "Maria", "source": "macroplan", "changeNote": ""}, {"id": "mp10", "type": "post", "platform": "Facebook", "status": "idea", "date": "2026-07-03", "time": "12:00", "title": "Answer 3 Questions in Facebook Groups Time: ~20 minutes Search for unanswered questions ab", "pillar": "Macroplan Group, Tasks", "template": "card", "ratio": "square", "headline": "Answer 3 Questions in Facebook Groups Time: ~20 minutes Sear", "accent": "", "cta": "DM US", "eyebrow": "Boko Digital", "bullets": [], "caption": "Answer 3 Questions in Facebook Groups Time: ~20 minutes Search for unanswered questions about AI tools, customer service automation, Shopify reporting, Klaviyo email flows, or reducing manual admin. Answer with specific, actionable advice. ", "owner": "", "source": "macroplan", "changeNote": ""}, {"id": "mp11", "type": "post", "platform": "LinkedIn", "status": "idea", "date": "2026-07-06", "time": "09:00", "title": "Comment on 5 LinkedIn Posts from AU Business Owners Time: ~20 minutes Find posts from AU r", "pillar": "Macroplan Tasks", "template": "card", "ra ndustrial printing. Plotter spare parts. Premium window tinting. Three brands. Three customer types. Five social media accounts. Two websites. One team manually trying to figure out who each message was for and getting it wrong constantly. A machinery technician was receiving window tinting enquiries. The tinting team was fielding technical parts questions. Nobody had full visibility across any of it. We built them an AI brain instea", "owner": "Maria", "source": "macroplan", "changeNote": ""}, {"id": "mp18", "type": "video", "platform": "Instagram", "status": "drafting", "date": "2026-07-10", "time": "12:00", "title": "Script 09: Find Wasted Google Ads Spend Using Claude Pending Pillar: Why Your Ads Are Gett", "pillar": "Macroplan Reel", "template": "statement", "ratio": "square", "headline": "Script 09: Find Wasted Google Ads Spend Using Claude Pending", "accent": "", "cta": "DM US", "eyebrow": "Mar", "bullets": [], "caption": "Most AU retailers running Google Ads don't know where their budget is being wasted. Here's how to find out in under 5 minutes. No integrations. No third-party tools. Just Claude and 3 CSV exports. Export your campaign, keyword, and search terms reports from Google Ads Upload all 3 to Claude with our audit prompt Get a plain-English breakdown of wasted spend, top performers, and irrelevant search terms to cut Claude does it in 2 minutes. Used to take hours. DM us \"GOOGLE\" and we'll send you the exact prompt we use for AU retail accounts.", "owner": "Mar", "source": "macroplan", "changeNote": ""}, {"id": "mp19", "type": "post", "platform": "LinkedIn", "status": "idea", "date": "2026-07-13", "time": "09:00", "title": "Questions in LinkedIn Groups Time: ~20 minutes Look for questions about AI, automation, e-", "pillar": "Macroplan Tasks", "template": "card", "ratio": "square", "headline": "Questions in LinkedIn Groups Time: ~20 minutes Look for ques", "accent": "", "cta": "DM US", "eyebrow": "Boko Digital", "bullets": [], "caption": "Questions in LinkedIn Groups Time: ~20 minutes Look for questions about AI, automation, e-commerce ops, or manual processes. If no question exists, start one: \"What's the most time-consuming manual task in your business right now? We track ", "owner": "", "source": "macroplan", "changeNote": ""}, {"id": "mp20", "type": "video", "platform": "Instagram", "status": "idea", "date": "2026-07-13", "time": "12:00", "title": "Script 04: 60-Second SEO Audit on Any Product Page Pillar: AI Demystified Format: Screen r", "pillar": "Macroplan Reel", "template": "statement", "ratio": "square", "headline": "Script 04: 60-Second SEO Audit on Any Product Page Pillar: A", "accent": "", "cta": "DM US", "eyebrow": "Boko", "bullets": [], "caption": "You don t need an expensive SEO agency to fix your product pages. You just need 60 seconds. Most brand owners ignore product SEO because they think it requires hours of keyword research and tedious rewriting for every single SKU. It doesn't. You can demystify the entire process using AI, without losing your brand voice. Here is the dead-simple 60-second workflow we use at Boko Digital: The Input: Copy the URL of any underperforming product page on your Shopify store. The Engine: Paste it into Claude alongside our specialized SEO rewrite prompt. The Result: Watch Claude scrape the page, identif", "owner": "Boko", "source": "macroplan", "changeNote": ""}, {"id": "mp21", "type": "post", "platform": "LinkedIn", "status": "idea", "date": "2026-07-14", "time": "09:00", "title": "The biggest blocker for AU small businesses isn't budget. It's habit.", "pillar": "Macroplan Post", "template": "card", "ratio": "square", "headline": "The biggest blocker for AU small businesses isn't budget. It", "accent": "", "cta": "DM US", "eyebrow": "Maria", "bullets": [], "caption": "When I started Boko, I thought the biggest blocker for small AU businesses was money. After 12 months building automation systems, I know it's not money. It's habit. We built a reporting syste ates your thinking instead of challenging it. I've seen this with business owners. They ask AI to review their pricing. AI says it looks great. They push back on an analysis. The AI immediately backs down even when it was rig"}, {"id": "mp30", "type": "video", "platform": "Instagram", "status": "drafting", "date": "2026-07-20", "time": "12:00", "title": "Script 06: AI Customer Service for WISMO in One Afternoon Pillar: Behind the Build Format:", "pillar": "Macroplan Reel", "template": "statement", "ratio": "square", "headline": "Script 06: AI Customer Service for WISMO in One Afternoon Pi", "accent": "", "cta": "DM US", "eyebrow": "Mar", "bullets": [], "caption": "\"Where s my order?\" is the number one customer service ticket for every AU retailer. Here s how to automate the answer completely in one afternoon. WISMO (Where Is My Order) tickets drain your support team's time and slow down response rates. But you don't need a complex AI development team to fix it. You just need to connect the dots between your helpdesk and your shipping carrier. Here is the exact 3-step setup we use at Boko Digital to handle WISMO tickets on autopilot: Step 1 (The Connection): Head into Gorgias Settings Integrations, and connect your Shopify store. (If you use StarTrack or", "owner": "Mar", "source": "macroplan", "changeNote": ""}, {"id": "mp31", "type": "post", "platform": "LinkedIn", "status": "drafting", "date": "2026-07-21", "time": "09:00", "title": "12 months building AI systems for AU businesses 5 things I actually learned", "pillar": "Macroplan Post", "template": "card", "ratio": "square", "headline": "12 months building AI systems for AU businesses 5 things I a", "accent": "", "cta": "DM US", "eyebrow": "Maria", "bullets": [], "caption": "A year ago I thought the hardest part of building an AI automation agency would be the technology. It wasn't. Here are 5 things I actually learned. 1\\. The tool is never the problem. The habit is. Every business we've worked with already h function wrapLines(ctx,text,maxW){const words=text.split(/\s+/);const lines=[];let line="";

function drawCTApill(ctx,W,H,margin,p,dark){const txt=(p.cta||"").trim().toUpperCase();if(!txt)return;

  let tw=ctx.measureText(txt).width;const padX=W*0.032,bh=W*0.07;let bw=tw+padX*2;const maxw=W*0.56;
  if(bw>maxw){const f=maxw/bw;ctx.font="700 "+(W*0.029*f)+"px Poppins";tw=ctx.measureText(txt).width;bw=tw+padX*2;}
  const bx=W-margin-bw,by=margin,r=bh/2;

  ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
  ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
  ctx.fillStyle=dark?C.black:C.lime;ctx.fillText(txt,bx+padX,by+bh/2);ctx.textBaseline="top";}
function drawAccentLines(ctx,lines,accent,x,yStart,lh,baseColor,accentColor,align,W){ctx.textBaseline="top";
  const acc=(accent||"").trim().toUpperCase().replace(/[^A-Z0-9.]/g,"");let y=yStart;
  for(const ln of lines){const words=ln.split(" ");const totalW=ctx.measureText(ln).width;
    let cx=align==="center"?(W/2-totalW/2):x;ctx.textAlign="left";
    for(let i=0;i<words.length;i++){const w=words[i];const word=i<words.length-1?w+" ":w;
      const clean=w.replace(/[^A-Za-z0-9.]/g,"").toUpperCase();
      ctx.fillStyle=(acc&&clean===acc)?accentColor:baseColor;ctx.fillText(word,cx,y);
      cx+=ctx.measureText(word).width;}
    y+=lh;}return y;}

function renderPoster(canvas,p){const[W,H]=DIMS[p.ratio||"square"];canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");const margin=W*0.085;const tpl=p.template;
  const isLime=tpl==="lime";const bg=isLime?C.lime:C.black;const base=isLime?C.black:C.white;
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.textBaseline="top";
  // K mark top-left (split & lime handle their own marks)
  if(tpl!=="split"&&tpl!=="statement"&&tpl!=="stat"&&tpl!=="founder"){kMark(ctx,W,margin,!isLime);}

  if(tpl==="statement"){kMark(ctx,W,margin,true,true);const fs=W*0.072,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);const yStart=(H-lines.length*lh)/2;
    drawAccentLines(ctx,lines,p.accent,margin,yStart,lh,base,C.lime,"center",W);footer(ctx,W,H,margin,base);}
  else if(tpl==="stat"){kMark(ctx,W,margin,true,true);ctx.textAlign="center";ctx.fillStyle=base;ctx.textBaseline="top";
    ctx.font="600 "+(W*0.034)+"px Poppins";ctx.fillText((p.eyebrow||"").toUpperCase(),W/2,H*0.30);
    let fs=W*0.26;ctx.font="800 "+fs+"px Poppins";
    while(ctx.measureText(p.accent).width>W-2*margin&&fs>40){fs*=0.94;ctx.font="800 "+fs+"px Poppins";}
    ctx.fillStyle=C.lime;ctx.textBaseline="middle";ctx.fillText(p.accent,W/2,H*0.50);
    ctx.fillStyle=base;ctx.textBaseline="top";ctx.textAlign="left";ctx.font="600 "+(W*0.040)+"px Poppins";
    const lns=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let y=H*0.66;
    for(const l of lns){const tw=ctx.measureText(l).width;ctx.fillText(l,W/2-tw/2,y);y+=W*0.040*1.2;}
    ctx.textAlign="left";footer(ctx,W,H,margin,base);}
  else if(tpl==="cta"){const fs=W*0.072,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);
    drawAccentLines(ctx,lines,p.accent,margin,H*0.26,lh,base,C.lime,"left",W);
    const btnText=(p.cta||"LEARN MORE").toUpperCase();ctx.font="700 "+(W*0.040)+"px Poppins";ctx.textBaseline="middle";
    const tw=ctx.measureText(btnText).width;const padX=W*0.05,bh=W*0.115;const bw=tw+padX*2;const bx=margin,by=H-margin-bh-W*0.06;const r=bh/2;
    ctx.fillStyle=C.lime;ctx.beginPath();ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.fillText(btnText,bx+padX,by+bh/2);ctx.textBaseline="top";footer(ctx,W,H,margin,base);}
  else if(tpl==="card"){let y=margin+W*0.11/KASPECT+W*0.03;ctx.textAlign="left";ctx.fillStyle=base;ctx.textBaseline="top";
    ctx.font="700 "+(W*0.040)+"px Poppins";ctx.fillText("Boko Digital",margin,y);
    ctx.fillStyle=C.lime;ctx.font="500 "+(W*0.030)+"px Poppins";ctx.fillText("@bokodigital",margin,y+W*0.050);
    ctx.fillStyle=base;const fs=W*0.052,lh=fs*1.28;ctx.font="500 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline,W-2*margin);let by=H*0.40;for(const l of lines){ctx.fillText(l,margin,by);by+=lh;}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="lime"){const fs=W*0.082,lh=fs*1.1;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);const yStart=(H-lines.length*lh)/2;
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.textBaseline="top";let y=yStart;
    for(const l of lines){ctx.fillText(l,margin,y);y+=lh;}
    const a=W*0.10,ax=W-margin-a,ay=H-margin-a;ctx.strokeStyle=C.black;ctx.lineWidth=W*0.012;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.beginPath();ctx.moveTo(ax,ay+a);ctx.lineTo(ax+a,ay);ctx.moveTo(ax+a*0.25,ay);ctx.lineTo(ax+a,ay);ctx.lineTo(ax+a,ay+a*0.75);ctx.stroke();
    footer(ctx,W,H,margin,C.black);}
  else if(tpl==="checklist"){const fs=W*0.062,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let y=margin+W*0.11/KASPECT+W*0.055;
    y=drawAccentLines(ctx,lines,p.accent,margin,y,lh,base,C.lime,"left",W);y+=W*0.04;
    const items=(p.bullets&&p.bullets.length?p.bullets:["Strategy","Design","Development","Marketing"]).slice(0,4);
    const ifs=W*0.040;ctx.font="500 "+ifs+"px Poppins";const r=W*0.026;
    for(const it of items){const cy=y+ifs/2;
      ctx.beginPath();ctx.arc(margin+r,cy,r,0,Math.PI*2);ctx.fillStyle=C.lime;ctx.fill();
      ctx.strokeStyle=C.black;ctx.lineWidth=W*0.008;ctx.lineCap="round";ctx.lineJoin="round";
      ctx.beginPath();ctx.moveTo(margin+r-r*0.45,cy);ctx.lineTo(margin+r-r*0.1,cy+r*0.4);ctx.lineTo(margin+r+r*0.5,cy-r*0.45);ctx.stroke();
      ctx.fillStyle=base;ctx.textBaseline="top";ctx.fillText(it,margin+r*2+W*0.03,y+ifs*0.12);y+=ifs*1.9;}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="quote"){ctx.fillStyle=C.lime;ctx.textAlign="left";ctx.textBaseline="top";
    ctx.font="800 "+(W*0.20)+"px Poppins";ctx.fillText("“",margin,H*0.40-W*0.135);
    const fs=W*0.060,lh=fs*1.26;ctx.font="600 "+fs+"px Poppins";ctx.fillStyle=base;
    const lines=wrapLines(ctx,p.headline,W-2*margin);let y=H*0.40;
    for(const l of lines){ctx.fillText(l,margin,y);y+=lh;}
    y+=W*0.02;ctx.fillStyle=C.lime;ctx.font="700 "+(W*0.034)+"px Poppins";ctx.fillText("— Boko Digital",margin,y);
    footer(ctx,W,H,margin,base);}
  else if(tpl==="grid"){ctx.fillStyle=base;ctx.textAlign="left";ctx.textBaseline="top";
    ctx.font="700 "+(W*0.050)+"px Poppins";
    const hl=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let hy=margin+W*0.11/KASPECT+W*0.05;
    for(const l of hl){ctx.fillText(l,margin,hy);hy+=W*0.050*1.12;}
    const items=(p.bullets&&p.bullets.length?p.bullets:["Strategy","Design","Development","Marketing"]).slice(0,4);
    const gx=margin,gy=hy+W*0.04,gw=W-2*margin,gh=H-gy-margin*1.4;const cw=gw/2,ch=gh/2;
    ctx.strokeStyle=C.lime;ctx.lineWidth=W*0.006;
    for(let i=0;i<4;i++){const cx=gx+(i%2)*cw,cyy=gy+Math.floor(i/2)*ch;
      ctx.strokeRect(cx+ctx.lineWidth/2,cyy+ctx.lineWidth/2,cw-ctx.lineWidth,ch-ctx.lineWidth);
      ctx.fillStyle=C.lime;ctx.font="800 "+(W*0.030)+"px Poppins";ctx.fillText("0"+(i+1),cx+W*0.03,cyy+W*0.03);
      ctx.fillStyle=base;ctx.font="600 "+(W*0.034)+"px Poppins";
      const wl=wrapLines(ctx,(items[i]||"").toUpperCase(),cw-W*0.06);let ty=cyy+ch-W*0.03-wl.length*W*0.034*1.1;
      for(const l of wl){ctx.fillText(l,cx+W*0.03,ty);ty+=W*0.034*1.1;}}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="index"){ctx.textAlign="left";ctx.textBaseline="top";
    let y=margin+W*0.11/KASPECT+W*0.05;
    ctx.fillStyle=C.lime;ctx.font="600 "+(W*0.032)+"px Poppins";
    ctx.fillText((p.eyebrow||"TIP 01").toUpperCase(),margin,y);
    y+=W*0.032*1.3+W*0.02;
    const big=(p.accent||"01");const bfs=W*0.17;ctx.font="800 "+bfs+"px Poppins";ctx.fillStyle=C.lime;
    ctx.fillText(big,margin,y);
    y+=bfs*1.0;
    const fs=W*0.060,lh=fs*1.16;ctx.font="700 "+fs+"px Poppins";ctx.fillStyle=base;
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);
    for(const l of lines){ctx.fillText(l,margin,y);y+=lh;}
    y+=W*0.025;
    ctx.strokeStyle=C.lime;ctx.lineWidth=W*0.012;ctx.beginPath();ctx.moveTo(margin,y);ctx.lineTo(margin+W*0.18,y);ctx.stroke();
    y+=W*0.05;
    const body=(p.caption||"").split("\n")[0];ctx.fillStyle=base;ctx.font="400 "+(W*0.032)+"px Poppins";
    for(const l of wrapLines(ctx,body,W-2*margin).slice(0,4)){ctx.fillText(l,margin,y);y+=W*0.032*1.5;}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="split"){const bandH=H*0.42;
    ctx.fillStyle=C.lime;ctx.fillRect(0,0,W,bandH);
    ctx.fillStyle=C.black;ctx.fillRect(0,bandH,W,H-bandH);
    kMark(ctx,W,margin,false); // black K on lime band
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.textBaseline="top";
    ctx.font="700 "+(W*0.038)+"px Poppins";ctx.fillText("Boko Digital",margin,margin+W*0.11/KASPECT+W*0.02);
    ctx.font="500 "+(W*0.030)+"px Poppins";ctx.fillText("@bokodigital",margin,margin+W*0.11/KASPECT+W*0.02+W*0.048);
    const fs=W*0.064,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let y=bandH+W*0.07;
    y=drawAccentLines(ctx,lines,p.accent,margin,y,lh,C.white,C.lime,"left",W);
    const btnText=(p.cta||"LEARN MORE").toUpperCase();ctx.font="700 "+(W*0.038)+"px Poppins";ctx.textBaseline="middle";
    const tw=ctx.measureText(btnText).width;const padX=W*0.045,bh=W*0.10;const bw=tw+padX*2;const bx=margin,by=H-margin-bh;const r=bh/2;
    ctx.fillStyle=C.lime;ctx.beginPath();ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.fillText(btnText,bx+padX,by+bh/2);ctx.textBaseline="top";}
  else if(tpl==="founder"){ctx.textAlign="left";
    const name=(p.eyebrow||"Maria Jose Mendieta");const handle=(p.cta&&p.cta.indexOf("@")===0)?p.cta:"@boko.digital.solutions";
    const av=W*0.052,hx=margin,hcy=H*0.305;
    const avImg=(p.avatar&&typeof AVATARS!=="undefined"&&AVATARS[p.avatar]&&AVATARS[p.avatar].complete&&AVATARS[p.avatar].naturalWidth)?AVATARS[p.avatar]:null;
    if(avImg){ctx.save();ctx.beginPath();ctx.arc(hx+av,hcy,av,0,Math.PI*2);ctx.clip();ctx.drawImage(avImg,hx,hcy-av,av*2,av*2);ctx.restore();}
    else{ctx.beginPath();ctx.arc(hx+av,hcy,av,0,Math.PI*2);ctx.fillStyle="#26292e";ctx.fill();
      const ini=name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();
      ctx.fillStyle=C.white;ctx.font="700 "+(av*0.92)+"px Poppins";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(ini,hx+av,hcy+av*0.04);ctx.textAlign="left";}
    ctx.beginPath();ctx.arc(hx+av,hcy,av,0,Math.PI*2);ctx.lineWidth=W*0.004;ctx.strokeStyle=C.lime;ctx.stroke();
    const nx=hx+av*2+W*0.025,nameY=hcy-av*0.55;
    ctx.fillStyle=C.white;ctx.font="700 "+(W*0.034)+"px Poppins";ctx.textBaseline="top";ctx.fillText(name,nx,nameY);
    const nameW=ctx.measureText(name).width,bcx=nx+nameW+W*0.018,bcy=nameY+W*0.018,br=W*0.016;
    ctx.beginPath();ctx.arc(bcx,bcy,br,0,Math.PI*2);ctx.fillStyle="#1d9bf0";ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=W*0.006;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.beginPath();ctx.moveTo(bcx-br*0.42,bcy);ctx.lineTo(bcx-br*0.08,bcy+br*0.4);ctx.lineTo(bcx+br*0.5,bcy-br*0.42);ctx.stroke();
    ctx.fillStyle="#8a8f98";ctx.font="500 "+(W*0.026)+"px Poppins";ctx.fillText(handle,nx,nameY+W*0.042);
    ctx.textBaseline="top";const bfs=W*0.030,blh=bfs*1.5;let y=H*0.42;
    ctx.fillStyle=C.white;ctx.font="700 "+bfs+"px Poppins";
    for(const l of wrapLines(ctx,p.headline||"",W-2*margin)){ctx.fillText(l,margin,y);y+=blh;}
    y+=blh*0.45;ctx.font="400 "+bfs+"px Poppins";
    const paras=(p.caption||"").split("\n");
    for(const para of paras){if(para.trim()===""){y+=blh*0.55;continue;}
      for(const l of wrapLines(ctx,para,W-2*margin)){ctx.fillStyle=C.white;ctx.fillText(l,margin,y);y+=blh;}y+=blh*0.4;}
  }
  else if(tpl==="carousel"){kMark(ctx,W,margin,true);
    const fs=W*0.076,lh=fs*1.1;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);
    let y=H*0.30;drawAccentLines(ctx,lines,p.accent,margin,y,lh,base,C.lime,"left",W);
    const dots=5,dr=W*0.012,gap=W*0.045,dy=H*0.64;let dx=margin+dr;
    for(let i=0;i<dots;i++){ctx.beginPath();ctx.arc(dx,dy,dr,0,Math.PI*2);ctx.fillStyle=i===0?C.lime:"#3a3f46";ctx.fill();dx+=gap;}
    ctx.fillStyle=C.lime;ctx.font="700 "+(W*0.032)+"px Poppins";ctx.textBaseline="middle";ctx.textAlign="left";
    ctx.fillText("SWIPE",margin,dy+W*0.075);
    const sw=ctx.measureText("SWIPE").width,ax=margin+sw+W*0.03,ay=dy+W*0.075;
    ctx.strokeStyle=C.lime;ctx.lineWidth=W*0.008;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+W*0.055,ay);ctx.moveTo(ax+W*0.036,ay-W*0.018);ctx.lineTo(ax+W*0.055,ay);ctx.lineTo(ax+W*0.036,ay+W*0.018);ctx.stroke();
    ctx.textBaseline="top";footer(ctx,W,H,margin,base);}
  if(tpl!=="cta"&&tpl!=="split")drawCTApill(ctx,W,H,margin,p,!isLime);
}

/* ---------- board ---------- */
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],WK=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return "";const dt=new Date(d+"T00:00:00");if(isNaN(dt))return d;return WK[dt.getDay()]+" "+dt.getDate()+" "+MON[dt.getMonth()];}
function isOverdue(p){return p.date && p.date<todayStr() && p.status!=="published";}
function platClass(p){return p==="Instagram"?"ig":p==="LinkedIn"?"li":p==="YouTube"?"yt":p==="Hubspot"?"hs":"fb";}
let curMonth="",curWeek=null,_brd=null;
function scheduleBoard(){clearTimeout(_brd);_brd=setTimeout(()=>{if(document.getElementById("overlay").classList.contains("show"))renderBoard();},450);}
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function ym(d){return (d||"").slice(0,7);}
function isoWeek(d){if(!d)return"";const dt=new Date(d+"T00:00:00");if(isNaN(dt))return"";const t=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));const day=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-day+3);const w1=new Date(Date.UTC(t.getUTCFullYear(),0,4));const w=1+Math.round(((t-w1)/864e5-3+((w1.getUTCDay()+6)%7))/7);return t.getUTCFullYear()+"-W"+String(w).padStart(2,"0");}
function weekMonday(wk){const [y,w]=wk.split("-W").map(Number);const s=new Date(Date.UTC(y,0,4));s.setUTCDate(s.getUTCDate()-((s.getUTCDay()+6)%7)+(w-1)*7);return s;}
function monthLabel(m){const[y,mm]=m.split("-");return MONTHS[+mm-1]+" "+y;}
function defaultMonth(){const c={};state.forEach(p=>{if(p.date)c[ym(p.date)]=(c[ym(p.date)]||0)+1;});let best="",n=-1;for(const k in c)if(c[k]>n){n=c[k];best=k;}return best||new Date().toISOString().slice(0,7);}
function shiftMonth(delta){const[y,m]=curMonth.split("-").map(Number);const d=new Date(y,m-1+delta,1);curMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");curWeek=null;renderBoard();}
function weeksInMonth(){const ws=new Set();state.forEach(p=>{if(p.date&&ym(p.date)===curMonth)ws.add(isoWeek(p.date));});return [...ws].sort();}
function renderWeekSel(){const sel=document.getElementById("weekSel");const ws=weeksInMonth();
  sel.innerHTML='<option value="">All weeks</option>'+ws.map(w=>{const m=weekMonday(w);return `<option value="${w}" ${curWeek===w?"selected":""}>Week of ${m.getUTCDate()} ${MONTHS[m.getUTCMonth()].slice(0,3)}</option>`;}).join("");
  sel.onchange=()=>{curWeek=sel.value||null;renderBoard();};}
function visible(){return state.filter(p=>{
  if(filter!=="All"&&p.platform!==filter)return false;
  if(typeFilter!=="All"&&kindOf(p)!==typeFilter)return false;
  if(curWeek)return isoWeek(p.date)===curWeek;
  if(!p.date)return true;
  return ym(p.date)===curMonth;});}
function counts(){
  cTotal.textContent=state.length;
  cReview.textContent=state.filter(p=>p.status==="review").length;
  cApproved.textContent=state.filter(p=>p.status==="approved").length;
}
function renderFilters(){
  const el=document.getElementById("filters");el.innerHTML="";
  ["All",...PLATFORMS].forEach(f=>{const b=document.createElement("button");
    b.className="chip"+(filter===f?" on":"");b.textContent=f;b.onclick=()=>{filter=f;renderBoard();};el.appendChild(b);});
  const te=document.getElementById("typefilters");te.innerHTML="";
  TYPE_FILTERS.forEach(([label,kind])=>{const b=document.createElement("button");
    b.className="chip"+(typeFilter===kind?" on":"");b.textContent=label;b.onclick=()=>{typeFilter=kind;renderBoard();};te.appendChild(b);});
}
function renderBoard(){
  if(!curMonth)curMonth=defaultMonth();
  document.getElementById("monthLabel").textContent=monthLabel(curMonth);
  renderWeekSel();renderFilters();counts();
  const board=document.getElementById("board");board.innerHTML="";
  STATUSES.forEach(st=>{
    const col=document.createElement("div");col.className="col";col.dataset.status=st.id;
    const items=visible().filter(p=>p.status===st.id);
    col.innerHTML=`<h2>${st.label} <span class="n">${items.length}</span></h2><div class="cards"></div>`;
    const cards=col.querySelector(".cards");
    items.forEach(p=>cards.appendChild(cardEl(p)));
    // drop zone
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drag");});
    col.addEventListener("dragleave",()=>col.classList.remove("drag"));
    col.addEventListener("drop",e=>{e.preventDefault();col.classList.remove("drag");
      const id=e.dataTransfer.getData("text/plain");const p=state.find(x=>x.id===id);
      if(p&&p.status!==st.id){p.status=st.id;save();renderBoard();}});
    board.appendChild(col);
  });
}
function cardEl(p){
  const c=document.createElement("div");c.className="card";c.draggable=true;
  c.innerHTML=`<div class="thumb"></div>
    <div class="cbody">
      <div class="badges"><span class="badge type">${p.type}</span><span class="badge ${platClass(p.platform)}">${p.platform}</span>${p.date?`<span class="badge date ${isOverdue(p)?'od':''}">📅 ${fmtDate(p.date)}${p.time?" · "+p.time:""}</span>`:""}</div>
      <div class="ctitle">${esc(p.title)}</div>
      <div class="pillar">${esc(p.pillar||"")}</div>
      ${p.changeNote?`<div class="note">✎ ${esc(p.changeNote)}</div>`:""}
      <div class="cact">
        <button class="mini" data-a="open">Open</button>
        <button class="mini ok" data-a="approve">Approve</button>
        <button class="mini warn" data-a="changes">Changes</button>
      </div>
    </div>`;
  if(p.platform==="Hubspot"){c.querySelector(".thumb").innerHTML=emailThumbHTML(p);}else if(p.type==="video"){c.querySelector(".thumb").innerHTML=videoThumbHTML(p);}else{const cv=document.createElement("canvas");c.querySelector(".thumb").appendChild(cv);renderPoster(cv,p);}
  c.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",p.id);c.classList.add("dragging");});
  c.addEventListener("dragend",()=>c.classList.remove("dragging"));
  c.addEventListener("click",e=>{if(e.target.closest("[data-a]"))return;openEditor(p.id);});
  c.querySelector('[data-a="open"]').onclick=()=>openEditor(p.id);
  c.querySelector('[data-a="approve"]').onclick=()=>{p.status="approved";p.changeNote="";save();renderBoard();toast("Approved");};
  c.querySelector('[data-a="changes"]').onclick=()=>{const n=prompt("What needs to change?",p.changeNote||"");if(n===null)return;p.status="drafting";p.changeNote=n;save();renderBoard();};
  return c;
}

/* ---------- editor modal ---------- */
function isVideoFile(u){return /\.(mp4|webm|mov|m4v|ogg)(\?|$)/i.test(u||"");}
function ytId(u){const m=(u||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/))([\w-]{6,})/);return m?m[1]:null;}
function vimeoId(u){const m=(u||"").match(/vimeo\.com\/(?:video\/)?(\d+)/);return m?m[1]:null;}
function driveId(u){const m=(u||"").match(/drive\.google\.com\/file\/d\/([\w-]+)/);return m?m[1]:null;}
function embedSrc(u){const y=ytId(u);if(y)return"https://www.youtube.com/embed/"+y;const v=vimeoId(u);if(v)return"https://player.vimeo.com/video/"+v;const d=driveId(u);if(d)return"https://drive.google.com/file/d/"+d+"/preview";return null;}
function videoPlayerHTML(p){const u=p.videoUrl||p.publishedUrl||"";
  if(isVideoFile(u))return `<video class="vplayfile" src="${esc(u)}" controls playsinline></video>`;
  const e=embedSrc(u);
  if(e)return `<div class="vplaywrap"><iframe src="${esc(e)}" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe></div>`;
  return videoThumbHTML(p)+(u?'<div class="vnote2">This link can&#39;t be embedded. Use a YouTube, Vimeo, Google Drive, or direct .mp4 link to play it here.</div>':'<div class="vnote2">Paste a video link below to play it here.</div>');}
function videoThumbHTML(p){
  const u=p.videoUrl||p.publishedUrl||"";
  const pub=p.publishedUrl?'<span class="vpub">&#9654; Published</span>':'';
  if(isVideoFile(p.videoUrl)){return `<div class="vthumb"><span class="vlabel">${esc(p.platform)} &middot; Video</span><video class="vvid" src="${esc(p.videoUrl)}" controls playsinline preload="metadata" onclick="event.stopPropagation()"></video><span class="vtitle">${esc(p.title)}</span>${pub}</div>`;}
  const yid=ytId(u);
  const bg=yid?`<img class="vvid" src="https://img.youtube.com/vi/${yid}/hqdefault.jpg" alt="">`:"";
  return `<div class="vthumb">${bg}<span class="vlabel">${esc(p.platform)} &middot; Video</span><span class="play"></span><span class="vtitle">${esc(p.title)}</span>${pub}</div>`;
}
function emailThumbHTML(p){return `<div class="ethumb"><span class="elabel">Email &middot; Hubspot</span><div class="esub">${esc(p.subject||p.title)}</div>${p.preview?`<div class="eprev">${esc(p.preview)}</div>`:""}<div class="ebody">${esc((p.body||p.caption||"").slice(0,240))}</div><div class="esig">+ Maria Mendieta email signature (auto)</div></div>`;}
function copyEmail(p){const txt=(p.subject?("Subject: "+p.subject+"\n\n"):"")+(p.body||p.caption||"")+"\n\n"+EMAIL_SIG;navigator.clipboard.writeText(txt).then(()=>toast("Email + signature copied"));}
function openEditor(id){
  const p=state.find(x=>x.id===id);if(!p)return;
  const isEmail=p.platform==="Hubspot";const isVid=p.type==="video"&&!isEmail;
  const m=document.getElementById("modal");
  m.innerHTML=`
    <div class="mprev">${isEmail?emailThumbHTML(p):isVid?videoPlayerHTML(p):'<canvas id="mcv"></canvas>'}</div>
    <div class="mform">
      <div style="display:flex;align-items:center"><h3>${esc(p.title)}</h3><button class="x" data-a="close">&times;</button></div>
      ${isEmail?'':`<div class="seg" id="typeseg"><button data-ty="post" class="${!isVid?'on':''}">Post</button><button data-ty="video" class="${isVid?'on':''}">Video</button></div>`}
      ${(isVid||isEmail)?'':`<div class="seg" id="tplseg">${TEMPLATES.map(t=>`<button data-t="${t}" class="${p.template===t?'on':''}">${t}</button>`).join("")}</div>`}
      <div class="two">
        <div><label class="fl">Status</label><select class="f" data-f="status2">${STATUSES.map(sx=>`<option value="${sx.id}" ${p.status===sx.id?'selected':''}>${sx.label}</option>`).join("")}</select></div>
        <div><label class="fl">Platform</label><select class="f" data-f="platform">${PLATFORMS.map(pl=>`<option ${p.platform===pl?'selected':''}>${pl}</option>`).join("")}</select></div>
      </div>
      <div class="two">
        <div><label class="fl">Scheduled date</label><input type="date" class="f" data-f="date" value="${p.date||''}"></div>
        <div><label class="fl">Time (AEST)</label><input type="time" class="f" data-f="time" value="${p.time||''}"></div>
      </div>
      <div><label class="fl">Title (internal)</label><input class="f" data-f="title" value="${esc(p.title)}"></div>
      ${isEmail?`
      <div><label class="fl">Subject line</label><input class="f" data-f="subject" value="${esc(p.subject||p.title||'')}"></div>
      <div><label class="fl">Preview text</label><input class="f" data-f="preview" value="${esc(p.preview||'')}"></div>
      <div><label class="fl">Body message</label><textarea class="f" data-f="body" style="min-height:150px">${esc(p.body||p.caption||'')}</textarea></div>
      <div class="vnote">&#9993; Maria's HTML email signature is added automatically at the end of the body when you copy the email.</div>
      `:isVid?`<div class="vnote">&#127916; Video is uploaded manually${p.platform==="YouTube"?" to YouTube":""}. Paste a video link below to show it on the tile, and the published link once it's live.</div>
      <div class="two">
        <div><label class="fl">Video link (file / source)</label><input class="f" data-f="videoUrl" value="${esc(p.videoUrl||'')}" placeholder="https:// .mp4 or Drive/YouTube"></div>
        <div><label class="fl">Published link</label><input class="f" data-f="publishedUrl" value="${esc(p.publishedUrl||'')}" placeholder="https://youtu.be/..."></div>
      </div>
      <div><label class="fl">Script / caption</label><textarea class="f" data-f="caption">${esc(p.caption||'')}</textarea></div>
      `:`
      <div class="two">
        <div><label class="fl">Format</label><div class="seg" id="ratioseg"><button data-r="square" class="${p.ratio!=='story'?'on':''}">1:1</button><button data-r="story" class="${p.ratio==='story'?'on':''}">Story</button></div></div>
        <div><label class="fl">CTA</label><input class="f" data-f="cta" value="${esc(p.cta||'')}"></div>
      </div>
      <div><label class="fl">Headline / message</label><input class="f" data-f="headline" value="${esc(p.headline)}"></div>
      <div class="two">
        <div><label class="fl">Accent word / number</label><input class="f" data-f="accent" value="${esc(p.accent||'')}"></div>
        <div><label class="fl">Eyebrow</label><input class="f" data-f="eyebrow" value="${esc(p.eyebrow||'')}"></div>
      </div>
      <div><label class="fl">Bullets (comma)</label><input class="f" data-f="bullets" value="${esc((p.bullets||[]).join(', '))}"></div>
      <div><label class="fl">Caption</label><textarea class="f" data-f="caption">${esc(p.caption||'')}</textarea></div>`}
      ${p.changeNote?`<div class="note">&#9998; ${esc(p.changeNote)}</div>`:""}
      <div class="mactions">
        <button class="btn lime" data-a="approve">Approve</button>
        <button class="btn warn" data-a="changes">Request changes</button>
        <button class="btn ghost" data-a="copy">${isEmail?'Copy email':'Copy caption'}</button>
        ${(isVid||isEmail)?'':'<button class="btn ghost" data-a="download">Download PNG</button>'}
        <button class="btn" data-a="delete" style="color:#c0392b;border-color:#e9b7b1;background:#fff">Delete</button>
        <button class="btn lime" data-a="save" style="margin-left:auto">Save</button>
      </div>
    </div>`;
  const cv=m.querySelector("#mcv");if(cv)renderPoster(cv,p);
  const refreshPrev=()=>{const c2=m.querySelector("#mcv");if(c2){renderPoster(c2,p);}else{const pv=m.querySelector(".mprev");if(pv)pv.innerHTML=isEmail?emailThumbHTML(p):isVid?videoPlayerHTML(p):"";}};
  const ts=m.querySelector('#typeseg');if(ts)ts.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.type=b.dataset.ty;if(p.type==="video"&&(p.platform==="Hubspot"||p.platform==="Facebook"))p.platform="YouTube";save();openEditor(id);});
  const tplseg=m.querySelector('#tplseg');if(tplseg)tplseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.template=b.dataset.t;save();openEditor(id);});
  const ratioseg=m.querySelector('#ratioseg');if(ratioseg)ratioseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.ratio=b.dataset.r;save();openEditor(id);});
  m.querySelectorAll('[data-f]').forEach(inp=>{const f=inp.dataset.f;if(f==="status2"||f==="platform"||f==="date"||f==="time")return;
    inp.oninput=()=>{if(f==="bullets")p.bullets=inp.value.split(",").map(x=>x.trim()).filter(Boolean);else p[f]=inp.value;save();if(f!=="videoUrl"&&f!=="publishedUrl")refreshPrev();if(f==="title"||f==="subject"||f==="body")m.querySelector("h3").textContent=p.title;scheduleBoard();};});
  ["videoUrl","publishedUrl"].forEach(f=>{const el=m.querySelector('[data-f="'+f+'"]');if(el)el.onchange=()=>{refreshPrev();scheduleBoard();};});
  m.querySelectorAll('[data-f="platform"]').forEach(sel=>sel.onchange=()=>{p.platform=sel.value;if(p.platform==="Hubspot")p.type="post";save();openEditor(id);scheduleBoard();});
  m.querySelectorAll('[data-f="status2"]').forEach(sel=>sel.onchange=()=>{p.status=sel.value;save();counts();scheduleBoard();});
  const dInp=m.querySelector('[data-f="date"]');if(dInp)dInp.onchange=()=>{p.date=dInp.value;save();scheduleBoard();};
  const tInp=m.querySelector('[data-f="time"]');if(tInp)tInp.onchange=()=>{p.time=tInp.value;save();scheduleBoard();};
  m.querySelector('[data-a="approve"]').onclick=()=>{p.status="approved";p.changeNote="";save();closeEditor();renderBoard();toast("Approved");};
  m.querySelector('[data-a="changes"]').onclick=()=>{const n=prompt("What needs to change?",p.changeNote||"");if(n===null)return;p.status="drafting";p.changeNote=n;save();closeEditor();renderBoard();};
  m.querySelector('[data-a="copy"]').onclick=()=>{if(isEmail)copyEmail(p);else navigator.clipboard.writeText(p.caption||"").then(()=>toast("Copied"));};
  const dl=m.querySelector('[data-a="download"]');if(dl)dl.onclick=()=>downloadPNG(p);
  m.querySelectorAll('[data-a="close"]').forEach(b=>b.onclick=closeEditor);
  const sv=m.querySelector('[data-a="save"]');if(sv)sv.onclick=()=>{save();closeEditor();toast("Saved");};
  const del=m.querySelector('[data-a="delete"]');if(del)del.onclick=()=>{if(confirm("Delete this card?")){state=state.filter(x=>x.id!==id);save();closeEditor();renderBoard();toast("Deleted");}};
  document.getElementById("overlay").classList.add("show");
}
function closeEditor(){document.getElementById("overlay").classList.remove("show");renderBoard();}
function renderBoardThumb(id){/* board re-renders on close; cheap no-op live */}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target.id==="overlay")closeEditor();});

function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function downloadPNG(p){const off=document.createElement("canvas");renderPoster(off,p);
  const a=document.createElement("a");a.download="boko_"+p.id+"_"+(p.ratio||"square")+".png";a.href=off.toDataURL("image/png");a.click();}
let toastT;function toast(msg){let t=document.getElementById("__t");
  if(!t){t=document.createElement("div");t.id="__t";
    t.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#BFFC00;color:#000;font-weight:600;padding:10px 16px;border-radius:10px;z-index:99;font-size:13px";
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity=0,1400);}

function newPost(){
  const p={id:"u"+Date.now(),type:"post",platform:"Instagram",status:"idea",title:"New post",
    template:"statement",ratio:"square",headline:"YOUR HEADLINE HERE",accent:"",cta:"DM US",
    eyebrow:"BOKO DIGITAL",bullets:["Point one","Point two","Point three"],caption:"",pillar:"Draft",date:"",changeNote:""};
  state.push(p);save();renderBoard();openEditor(p.id);
}
function newVideo(){
  const p={id:"v"+Date.now(),type:"video",platform:"YouTube",status:"idea",title:"New video",
    template:"statement",ratio:"square",headline:"",accent:"",cta:"",eyebrow:"Boko Digital",
    bullets:[],caption:"",pillar:"Video",date:"",videoUrl:"",publishedUrl:"",changeNote:""};
  state.push(p);save();renderBoard();openEditor(p.id);
}
document.getElementById("newBtn").onclick=newPost;
document.getElementById("newVid").onclick=newVideo;
document.getElementById("prevM").onclick=()=>shiftMonth(-1);
document.getElementById("nextM").onclick=()=>shiftMonth(1);
function boot(){detectSync();}
if(document.fonts&&document.fonts.load){
  Promise.all([document.fonts.load("700 80px Poppins"),document.fonts.load("800 80px Poppins"),document.fonts.load("500 40px Poppins"),document.fonts.load("400 40px Poppins")])
    .then(()=>document.fonts.ready).then(()=>{if(ready>=need)boot();}).catch(()=>{});
}
setTimeout(()=>{if(ready>=need)boot();},800);
</script>
