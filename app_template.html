<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boko Digital - Weekly Poster Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--lime:#BFFC00;--black:#000;--lilac:#F8F9FC;--white:#FFF;--muted:#8a8f98;--line:#23262b;--panel:#15171a;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',system-ui,sans-serif;background:var(--black);color:var(--white);}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#0a0b0c;z-index:5;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{height:30px}
  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .counters{display:flex;gap:10px;flex-wrap:wrap}
  .pill{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:var(--panel)}
  .pill.ok b{color:var(--lime)} .pill.warn b{color:#ffcf3f} .pill.pend b{color:#8a8f98}
  .wrap{max-width:1180px;margin:0 auto;padding:24px}
  .weekbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .weekbar h1{font-size:20px;margin:0;font-weight:700}
  .cal{display:flex;gap:6px;flex-wrap:wrap}
  .day{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:6px 9px;min-width:78px;text-align:center}
  .day b{display:block;color:var(--white);font-size:12px;margin-top:2px;font-weight:600}
  .day.has{border-color:var(--lime)} .day.has b{color:var(--lime)}
  .grid{display:grid;grid-template-columns:1fr;gap:22px}
  @media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
  .preview{background:#0a0b0c;display:flex;align-items:center;justify-content:center;padding:18px}
  canvas.disp{width:100%;max-width:360px;height:auto;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.45)}
  .body{padding:16px 16px 18px;display:flex;flex-direction:column;gap:11px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .seg{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:transparent;color:var(--muted);border:0;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--lime);color:#000}
  label.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:4px}
  input.f,textarea.f{width:100%;background:#0e1012;border:1px solid var(--line);color:var(--white);border-radius:8px;padding:9px 10px;font-family:inherit;font-size:13px}
  textarea.f{resize:vertical;min-height:70px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .status-line{display:flex;align-items:center;gap:8px;font-size:12px}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.pending{background:var(--muted)} .dot.approved{background:var(--lime)} .dot.changes{background:#ffcf3f}
  .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
  .btn{font-family:inherit;font-weight:600;font-size:13px;border-radius:9px;padding:9px 13px;cursor:pointer;border:1px solid var(--line);background:#0e1012;color:var(--white)}
  .btn.lime{background:var(--lime);color:#000;border-color:var(--lime)}
  .btn.ghost{background:transparent}
  .btn:hover{filter:brightness(1.08)}
  .changes-note{font-size:12px;color:#ffcf3f;background:rgba(255,207,63,.08);border:1px solid rgba(255,207,63,.25);border-radius:8px;padding:8px 10px;display:none}
  footer.app{padding:22px 24px;color:var(--muted);font-size:12px;text-align:center;border-top:1px solid var(--line)}
</style>
</head>
<body>
<header class="app">
  <div class="brand"><img id="logo" alt="Boko Digital"><span class="sub">Weekly Poster Studio</span></div>
  <div class="counters">
    <span class="pill ok">Approved <b id="cApproved">0</b></span>
    <span class="pill warn">Changes <b id="cChanges">0</b></span>
    <span class="pill pend">Pending <b id="cPending">0</b></span>
  </div>
</header>
<div class="wrap">
  <div class="weekbar"><h1 id="weekTitle">This week</h1><div class="cal" id="cal"></div></div>
  <div class="grid" id="grid"></div>
</div>
<footer class="app">Strategize. Execute. Deliver. - boko.com.au &middot; Posters render on-brand at 1080&times;1080 / 1080&times;1920. Edits save in your browser.</footer>
<script>
const LOGO_URL="__LOGO__";
const K_WHITE="__KWHITE__";
const K_BLACK="__KBLACK__";
const K_LIME="__KLIME__";
const POSTS=__POSTS__;
const WEEK_KEY="__WEEK_KEY__";
const STORAGE="boko_posters_"+WEEK_KEY;
const C={lime:"#BFFC00",black:"#000000",white:"#FFFFFF"};
const TEMPLATES=["statement","stat","cta","card","lime","checklist","quote","grid","index","split","founder","carousel","infographic"];
const DIMS={square:[1080,1080],story:[1080,1920]};
const KASPECT=1.046;
document.getElementById("logo").src=LOGO_URL;
document.getElementById("weekTitle").textContent="Week "+WEEK_KEY.split("-W")[1]+" · "+WEEK_KEY.split("-")[0];

let state=POSTS.map(p=>({...p}));
try{const saved=JSON.parse(localStorage.getItem(STORAGE)||"null");
  if(saved&&Array.isArray(saved)){state=state.map(p=>{const s=saved.find(x=>x.id===p.id);return s?{...p,...s}:p;});}}catch(e){}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));}

let ready=0; const need=3;
const kWhite=new Image(); const kBlack=new Image(); const kLime=new Image();
function onReady(){ready++;if(ready>=need)renderAll();}
kWhite.onload=onReady; kBlack.onload=onReady; kLime.onload=onReady;
kWhite.src=K_WHITE; kBlack.src=K_BLACK; kLime.src=K_LIME;

function wrapLines(ctx,text,maxW){const words=text.split(/\s+/);const lines=[];let line="";
  for(const w of words){const test=line?line+" "+w:w;
    if(ctx.measureText(test).width<=maxW||!line){line=test;}else{lines.push(line);line=w;}}
  if(line)lines.push(line);return lines;}
function kMark(ctx,W,margin,dark,center){const img=dark?kLime:kBlack;if(!img.complete)return;
  const kw=W*0.11,kh=kw/KASPECT;const x=center?(W-kw)/2:margin;ctx.drawImage(img,x,margin,kw,kh);return kh;}
function footer(ctx,W,H,margin,color){ctx.fillStyle=color;ctx.textBaseline="alphabetic";ctx.textAlign="left";
  ctx.font="600 "+(W*0.026)+"px Poppins";ctx.fillText("boko.com.au",margin,H-margin*0.7);ctx.textBaseline="top";}
function drawCTApill(ctx,W,H,margin,p,dark){const txt=(p.cta||"").trim().toUpperCase();if(!txt)return;
  ctx.font="700 "+(W*0.029)+"px Poppins";ctx.textBaseline="middle";ctx.textAlign="left";
  let tw=ctx.measureText(txt).width;const padX=W*0.032,bh=W*0.07;let bw=tw+padX*2;const maxw=W*0.56;
  if(bw>maxw){const f=maxw/bw;ctx.font="700 "+(W*0.029*f)+"px Poppins";tw=ctx.measureText(txt).width;bw=tw+padX*2;}
  const bx=W-margin-bw,by=margin,r=bh/2;
  ctx.fillStyle=dark?C.lime:C.black;ctx.beginPath();
  ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
  ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
  ctx.fillStyle=dark?C.black:C.lime;ctx.fillText(txt,bx+padX,by+bh/2);ctx.textBaseline="top";}
function drawAccentLines(ctx,lines,accent,x,yStart,lh,baseColor,accentColor,align,W){ctx.textBaseline="top";
  const accToks=(accent||"").toUpperCase().split(/\s+/).map(t=>t.replace(/[^A-Z0-9.]/g,"")).filter(Boolean);let y=yStart;
  for(const ln of lines){const words=ln.split(" ");const totalW=ctx.measureText(ln).width;
    let cx=align==="center"?(W/2-totalW/2):x;ctx.textAlign="left";
    for(let i=0;i<words.length;i++){const w=words[i];const word=i<words.length-1?w+" ":w;
      const clean=w.replace(/[^A-Za-z0-9.]/g,"").toUpperCase();
      ctx.fillStyle=(accToks.length&&accToks.indexOf(clean)>=0)?accentColor:baseColor;ctx.fillText(word,cx,y);
      cx+=ctx.measureText(word).width;}
    y+=lh;}return y;}

function subFit(ctx,text,maxW,maxH,startFs,minFs){text=(text||"").trim();if(!text)return null;let fs=startFs;for(;;){ctx.font="400 "+fs+"px Poppins";const lines=wrapLines(ctx,text,maxW);const lh=fs*1.38;if(lines.length*lh<=maxH||fs<=minFs)return{lines:lines,fs:fs,lh:lh,h:lines.length*lh};fs*=0.93;}}
function drawSub(ctx,text,x,yTop,maxW,maxH,align,W,color){const r=subFit(ctx,text,maxW,maxH,W*0.033,W*0.019);if(!r)return yTop;ctx.font="400 "+r.fs+"px Poppins";ctx.fillStyle=color;ctx.textBaseline="top";let y=yTop;for(const l of r.lines){const tw=ctx.measureText(l).width;const lx=align==="center"?(W/2-tw/2):x;ctx.fillText(l,lx,y);y+=r.lh;}return y;}
function renderPoster(canvas,p,slideIdx){const _ratio=p.ratio||"square";if(_ratio==="story"){const[SW,SH]=DIMS.story;canvas.width=SW;canvas.height=SH;const sctx=canvas.getContext("2d");const _lime=p.template==="lime";sctx.fillStyle=_lime?C.lime:C.black;sctx.fillRect(0,0,SW,SH);const _off=document.createElement("canvas");renderPoster(_off,Object.assign({},p,{ratio:"square"}),slideIdx);sctx.drawImage(_off,0,Math.round((SH-SW)/2),SW,SW);return;}const[W,H]=DIMS[_ratio];canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext("2d");const margin=W*0.085;const tpl=p.template;
  const isLime=tpl==="lime";const bg=isLime?C.lime:C.black;const base=isLime?C.black:C.white;
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.textBaseline="top";
  // K mark top-left (split & lime handle their own marks)
  if(tpl!=="split"&&tpl!=="statement"&&tpl!=="stat"&&tpl!=="founder"){kMark(ctx,W,margin,!isLime);}

  if(tpl==="statement"){kMark(ctx,W,margin,true);const fs=W*0.072,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);const hH=lines.length*lh;
    ctx.font="400 "+(W*0.033)+"px Poppins";const si=subFit(ctx,p.subhead,W-2*margin,H*0.24,W*0.033,W*0.019);
    const gap=si?W*0.04:0;const yStart=(H-(hH+gap+(si?si.h:0)))/2;
    ctx.font="700 "+fs+"px Poppins";
    drawAccentLines(ctx,lines,p.accent,margin,yStart,lh,base,C.lime,"left",W);
    if(si){let sy=yStart+hH+gap;ctx.font="400 "+si.fs+"px Poppins";ctx.fillStyle=base;ctx.textBaseline="top";for(const l of si.lines){ctx.fillText(l,margin,sy);sy+=si.lh;}}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="stat"){kMark(ctx,W,margin,true,true);ctx.textAlign="center";ctx.fillStyle=base;ctx.textBaseline="top";
    ctx.font="600 "+(W*0.034)+"px Poppins";ctx.fillText((p.eyebrow||"").toUpperCase(),W/2,H*0.30);
    let fs=W*0.26;ctx.font="800 "+fs+"px Poppins";
    while(ctx.measureText(p.accent).width>W-2*margin&&fs>40){fs*=0.94;ctx.font="800 "+fs+"px Poppins";}
    ctx.fillStyle=C.lime;ctx.textBaseline="middle";ctx.fillText(p.accent,W/2,H*0.50);
    ctx.fillStyle=base;ctx.textBaseline="top";ctx.textAlign="left";ctx.font="600 "+(W*0.040)+"px Poppins";
    const lns=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let y=H*0.66;
    for(const l of lns){const tw=ctx.measureText(l).width;ctx.fillText(l,W/2-tw/2,y);y+=W*0.040*1.2;}
    if((p.subhead||"").trim()){drawSub(ctx,p.subhead,margin,y+W*0.03,W-2*margin,H-margin*1.6-(y+W*0.03),"center",W,base);}
    ctx.textAlign="left";footer(ctx,W,H,margin,base);}
  else if(tpl==="cta"){const fs=W*0.072,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);
    const endY=drawAccentLines(ctx,lines,p.accent,margin,H*0.26,lh,base,C.lime,"left",W);
    const bh=W*0.115,by=H-margin-bh-W*0.06;
    if((p.subhead||"").trim()){drawSub(ctx,p.subhead,margin,endY+W*0.03,W-2*margin,by-(endY+W*0.03)-W*0.04,"left",W,base);}
    const btnText=(p.cta||"LEARN MORE").toUpperCase();ctx.font="700 "+(W*0.040)+"px Poppins";ctx.textBaseline="middle";
    const tw=ctx.measureText(btnText).width;const padX=W*0.05;const bw=tw+padX*2;const bx=margin;const r=bh/2;
    ctx.fillStyle=C.lime;ctx.beginPath();ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.fillText(btnText,bx+padX,by+bh/2);ctx.textBaseline="top";footer(ctx,W,H,margin,base);}
  else if(tpl==="card"){let y=margin+W*0.11/KASPECT+W*0.03;ctx.textAlign="left";ctx.fillStyle=base;ctx.textBaseline="top";
    ctx.font="700 "+(W*0.040)+"px Poppins";ctx.fillText("Boko Digital",margin,y);
    ctx.fillStyle=C.lime;ctx.font="500 "+(W*0.030)+"px Poppins";ctx.fillText("@bokodigital",margin,y+W*0.050);
    ctx.fillStyle=base;const fs=W*0.052,lh=fs*1.28;ctx.font="500 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline,W-2*margin);let by=drawAccentLines(ctx,lines,p.accent,margin,H*0.40,lh,base,C.lime,"left",W);
    if((p.subhead||"").trim()){drawSub(ctx,p.subhead,margin,by+W*0.03,W-2*margin,H-margin*1.6-(by+W*0.03),"left",W,base);}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="lime"){const fs=W*0.082,lh=fs*1.1;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);const hH=lines.length*lh;
    ctx.font="400 "+(W*0.032)+"px Poppins";const si=subFit(ctx,p.subhead,W-2*margin,H*0.2,W*0.032,W*0.019);
    const gap=si?W*0.035:0;const yStart=(H-(hH+gap+(si?si.h:0)))/2;
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.textBaseline="top";let y=yStart;ctx.font="700 "+fs+"px Poppins";
    for(const l of lines){ctx.fillText(l,margin,y);y+=lh;}
    if(si){let sy=yStart+hH+gap;ctx.font="400 "+si.fs+"px Poppins";ctx.fillStyle=C.black;for(const l of si.lines){ctx.fillText(l,margin,sy);sy+=si.lh;}}
    footer(ctx,W,H,margin,C.black);}
  else if(tpl==="checklist"){const fs=W*0.062,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let y=margin+W*0.11/KASPECT+W*0.055;
    y=drawAccentLines(ctx,lines,p.accent,margin,y,lh,base,C.lime,"left",W);y+=W*0.04;
    const items=(p.bullets&&p.bullets.length?p.bullets:["Strategy","Design","Development","Marketing"]).slice(0,4);
    const ifs=W*0.040;ctx.font="500 "+ifs+"px Poppins";const r=W*0.026;
    const itX=margin+r*2+W*0.03,itAvail=W-itX-margin,ilh=ifs*1.18;
    for(const it of items){ctx.font="500 "+ifs+"px Poppins";const wl=wrapLines(ctx,it,itAvail).slice(0,2);
      const blockH=Math.max(ifs*1.9,wl.length*ilh+ifs*0.55);const cy=y+ifs/2;
      ctx.beginPath();ctx.arc(margin+r,cy,r,0,Math.PI*2);ctx.fillStyle=C.lime;ctx.fill();
      ctx.strokeStyle=C.black;ctx.lineWidth=W*0.008;ctx.lineCap="round";ctx.lineJoin="round";
      ctx.beginPath();ctx.moveTo(margin+r-r*0.45,cy);ctx.lineTo(margin+r-r*0.1,cy+r*0.4);ctx.lineTo(margin+r+r*0.5,cy-r*0.45);ctx.stroke();
      ctx.fillStyle=base;ctx.textBaseline="top";let ty=y+ifs*0.12;for(const l of wl){ctx.fillText(l,itX,ty);ty+=ilh;}
      y+=blockH;}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="quote"){ctx.fillStyle=C.lime;ctx.textAlign="left";ctx.textBaseline="top";
    ctx.font="800 "+(W*0.20)+"px Poppins";ctx.fillText("“",margin,H*0.40-W*0.135);
    const fs=W*0.060,lh=fs*1.26;ctx.font="600 "+fs+"px Poppins";ctx.fillStyle=base;
    const lines=wrapLines(ctx,p.headline,W-2*margin);let y=drawAccentLines(ctx,lines,p.accent,margin,H*0.40,lh,base,C.lime,"left",W);
    y+=W*0.02;ctx.fillStyle=C.lime;ctx.font="700 "+(W*0.034)+"px Poppins";ctx.fillText("— Boko Digital",margin,y);y+=W*0.034*1.4;
    if((p.subhead||"").trim()){drawSub(ctx,p.subhead,margin,y+W*0.02,W-2*margin,H-margin*1.6-(y+W*0.02),"left",W,base);}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="grid"){ctx.fillStyle=base;ctx.textAlign="left";ctx.textBaseline="top";
    ctx.font="700 "+(W*0.050)+"px Poppins";
    const hl=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let hy=margin+W*0.11/KASPECT+W*0.05;
    for(const l of hl){ctx.fillText(l,margin,hy);hy+=W*0.050*1.12;}
    const items=(p.bullets&&p.bullets.length?p.bullets:["Strategy","Design","Development","Marketing"]).slice(0,4);
    const gx=margin,gy=hy+W*0.04,gw=W-2*margin,gh=H-gy-margin*1.4;const cw=gw/2,ch=gh/2;
    ctx.strokeStyle=C.lime;ctx.lineWidth=W*0.006;
    for(let i=0;i<4;i++){const cx=gx+(i%2)*cw,cyy=gy+Math.floor(i/2)*ch;
      ctx.strokeRect(cx+ctx.lineWidth/2,cyy+ctx.lineWidth/2,cw-ctx.lineWidth,ch-ctx.lineWidth);
      ctx.fillStyle=C.lime;ctx.font="800 "+(W*0.030)+"px Poppins";ctx.fillText("0"+(i+1),cx+W*0.03,cyy+W*0.03);
      ctx.fillStyle=base;ctx.font="600 "+(W*0.034)+"px Poppins";
      const wl=wrapLines(ctx,(items[i]||"").toUpperCase(),cw-W*0.06);let ty=cyy+ch-W*0.03-wl.length*W*0.034*1.1;
      for(const l of wl){ctx.fillText(l,cx+W*0.03,ty);ty+=W*0.034*1.1;}}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="index"){ctx.textAlign="left";ctx.textBaseline="top";
    let y=margin+W*0.11/KASPECT+W*0.05;
    ctx.fillStyle=C.lime;ctx.font="600 "+(W*0.032)+"px Poppins";
    ctx.fillText((p.eyebrow||"TIP 01").toUpperCase(),margin,y);
    y+=W*0.032*1.3+W*0.02;
    const big=(p.accent||"01");const bfs=W*0.17;ctx.font="800 "+bfs+"px Poppins";ctx.fillStyle=C.lime;
    ctx.fillText(big,margin,y);
    y+=bfs*1.0;
    const fs=W*0.060,lh=fs*1.16;ctx.font="700 "+fs+"px Poppins";ctx.fillStyle=base;
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);
    for(const l of lines){ctx.fillText(l,margin,y);y+=lh;}
    y+=W*0.025;
    ctx.strokeStyle=C.lime;ctx.lineWidth=W*0.012;ctx.beginPath();ctx.moveTo(margin,y);ctx.lineTo(margin+W*0.18,y);ctx.stroke();
    y+=W*0.05;
    const body=(p.caption||"").split("\n")[0];ctx.fillStyle=base;ctx.font="400 "+(W*0.032)+"px Poppins";
    for(const l of wrapLines(ctx,body,W-2*margin).slice(0,4)){ctx.fillText(l,margin,y);y+=W*0.032*1.5;}
    footer(ctx,W,H,margin,base);}
  else if(tpl==="split"){const bandH=H*0.42;
    ctx.fillStyle=C.lime;ctx.fillRect(0,0,W,bandH);
    ctx.fillStyle=C.black;ctx.fillRect(0,bandH,W,H-bandH);
    kMark(ctx,W,margin,false); // black K on lime band
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.textBaseline="top";
    ctx.font="700 "+(W*0.038)+"px Poppins";ctx.fillText("Boko Digital",margin,margin+W*0.11/KASPECT+W*0.02);
    ctx.font="500 "+(W*0.030)+"px Poppins";ctx.fillText("@bokodigital",margin,margin+W*0.11/KASPECT+W*0.02+W*0.048);
    const fs=W*0.064,lh=fs*1.12;ctx.font="700 "+fs+"px Poppins";
    const lines=wrapLines(ctx,p.headline.toUpperCase(),W-2*margin);let y=bandH+W*0.07;
    y=drawAccentLines(ctx,lines,p.accent,margin,y,lh,C.white,C.lime,"left",W);
    const bh=W*0.10,by=H-margin-bh;
    if((p.subhead||"").trim()){drawSub(ctx,p.subhead,margin,y+W*0.025,W-2*margin,by-(y+W*0.025)-W*0.03,"left",W,C.white);}
    const btnText=(p.cta||"LEARN MORE").toUpperCase();ctx.font="700 "+(W*0.038)+"px Poppins";ctx.textBaseline="middle";
    const tw=ctx.measureText(btnText).width;const padX=W*0.045;const bw=tw+padX*2;const bx=margin;const r=bh/2;
    ctx.fillStyle=C.lime;ctx.beginPath();ctx.moveTo(bx+r,by);ctx.arcTo(bx+bw,by,bx+bw,by+bh,r);ctx.arcTo(bx+bw,by+bh,bx,by+bh,r);
    ctx.arcTo(bx,by+bh,bx,by,r);ctx.arcTo(bx,by,bx+bw,by,r);ctx.closePath();ctx.fill();
    ctx.fillStyle=C.black;ctx.textAlign="left";ctx.fillText(btnText,bx+padX,by+bh/2);ctx.textBaseline="top";}
  else if(tpl==="founder"){ctx.textAlign="left";
    const name=(p.eyebrow||"Maria Jose Mendieta");const handle=(p.cta&&p.cta.indexOf("@")===0)?p.cta:"@boko.digital.solutions";
    const av=W*0.052,hx=margin,hcy=H*0.305;
    const avImg=(p.avatar&&typeof AVATARS!=="undefined"&&AVATARS[p.avatar]&&AVATARS[p.avatar].complete&&AVATARS[p.avatar].naturalWidth)?AVATARS[p.avatar]:null;
    if(avImg){ctx.save();ctx.beginPath();ctx.arc(hx+av,hcy,av,0,Math.PI*2);ctx.clip();ctx.drawImage(avImg,hx,hcy-av,av*2,av*2);ctx.restore();}
    else{ctx.beginPath();ctx.arc(hx+av,hcy,av,0,Math.PI*2);ctx.fillStyle="#26292e";ctx.fill();
      const ini=name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();
      ctx.fillStyle=C.white;ctx.font="700 "+(av*0.92)+"px Poppins";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(ini,hx+av,hcy+av*0.04);ctx.textAlign="left";}
    ctx.beginPath();ctx.arc(hx+av,hcy,av,0,Math.PI*2);ctx.lineWidth=W*0.004;ctx.strokeStyle=C.lime;ctx.stroke();
    const nx=hx+av*2+W*0.025,nameY=hcy-av*0.55;
    ctx.fillStyle=C.white;ctx.font="700 "+(W*0.034)+"px Poppins";ctx.textBaseline="top";ctx.fillText(name,nx,nameY);
    const nameW=ctx.measureText(name).width,bcx=nx+nameW+W*0.018,bcy=nameY+W*0.018,br=W*0.016;
    ctx.beginPath();ctx.arc(bcx,bcy,br,0,Math.PI*2);ctx.fillStyle="#1d9bf0";ctx.fill();
    ctx.strokeStyle="#fff";ctx.lineWidth=W*0.006;ctx.lineCap="round";ctx.lineJoin="round";
    ctx.beginPath();ctx.moveTo(bcx-br*0.42,bcy);ctx.lineTo(bcx-br*0.08,bcy+br*0.4);ctx.lineTo(bcx+br*0.5,bcy-br*0.42);ctx.stroke();
    ctx.fillStyle="#8a8f98";ctx.font="500 "+(W*0.026)+"px Poppins";ctx.fillText(handle,nx,nameY+W*0.042);
    ctx.textBaseline="top";const bfs=W*0.030,blh=bfs*1.5;let y=H*0.42;
    ctx.fillStyle=C.white;ctx.font="700 "+bfs+"px Poppins";
    for(const l of wrapLines(ctx,p.headline||"",W-2*margin)){ctx.fillText(l,margin,y);y+=blh;}
    y+=blh*0.45;ctx.font="400 "+bfs+"px Poppins";
    const paras=(p.caption||"").split("\n");
    for(const para of paras){if(para.trim()===""){y+=blh*0.55;continue;}
      for(const l of wrapLines(ctx,para,W-2*margin)){ctx.fillStyle=C.white;ctx.fillText(l,margin,y);y+=blh;}y+=blh*0.4;}
  }
  else if(tpl==="infographic"){ctx.textAlign="left";ctx.textBaseline="top";
    const raw=(p.bullets&&p.bullets.length?p.bullets:["CBD: 61% increase in freelance work","Biohacking: 71% increase in freelancers hired","Astrology: 127% more design requests","Vegan foods: 20% more plant-based brands"]).slice(0,5);
    const items=raw.map(b=>{const m=String(b).split(/\s*[:—\-]\s+/);return m.length>1?{t:m[0],d:m.slice(1).join(" - ")}:{t:String(b),d:""};});
    const n=items.length;
    // ---- HUB (white circle w/ lime depth crescent, black title, lime accent pill) ----
    const hx=W*0.275,hy=H*0.5,hR=W*0.205;
    ctx.beginPath();ctx.arc(hx+W*0.022,hy,hR,0,Math.PI*2);ctx.fillStyle=C.lime;ctx.fill();
    ctx.beginPath();ctx.arc(hx,hy,hR,0,Math.PI*2);ctx.fillStyle=C.white;ctx.fill();
    (function(){const acc=(p.accent||"").trim().toUpperCase();const maxW=hR*1.55;let tfs=W*0.052;let lines;
      for(;;){ctx.font="700 "+tfs+"px Poppins";lines=wrapLines(ctx,(p.headline||"").toUpperCase(),maxW);if(lines.length*tfs*1.16<=hR*1.5||tfs<=W*0.028)break;tfs*=0.93;}
      const lh=tfs*1.16,blockH=lines.length*lh;let ty=hy-blockH/2;
      for(const ln of lines){const lw=ctx.measureText(ln).width;const hasAcc=acc&&ln.indexOf(acc)>=0;
        if(hasAcc){const ph=tfs*1.24,pw=lw+tfs*0.5,px=hx-pw/2,py=ty-tfs*0.1,pr=ph/2;
          ctx.fillStyle=C.black;ctx.beginPath();ctx.moveTo(px+pr,py);ctx.arcTo(px+pw,py,px+pw,py+ph,pr);ctx.arcTo(px+pw,py+ph,px,py+ph,pr);ctx.arcTo(px,py+ph,px,py,pr);ctx.arcTo(px,py,px+pw,py,pr);ctx.closePath();ctx.fill();
          ctx.fillStyle=C.lime;ctx.fillText(ln,hx-lw/2,ty);}
        else{ctx.fillStyle=C.black;ctx.fillText(ln,hx-lw/2,ty);}
        ty+=lh;}
    })();
    // ---- NODES (right) + connectors ----
    const nodeX=W*0.60,nodeR=W*0.052,areaTop=H*0.13,areaBot=H*0.9,step=(areaBot-areaTop)/n;
    const pillX=nodeX+nodeR+W*0.02,availW=W-pillX-margin;
    ctx.lineCap="round";ctx.lineJoin="round";
    for(let i=0;i<n;i++){const cy=areaTop+step*i+step/2;
      // connector: curve from hub edge toward node
      const ang=Math.atan2(cy-hy,nodeX-hx);const ax=hx+Math.cos(ang)*hR,ay=hy+Math.sin(ang)*hR;
      ctx.strokeStyle=C.white;ctx.lineWidth=W*0.004;ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo((ax+nodeX-nodeR)/2,cy,nodeX-nodeR,cy);ctx.stroke();
      ctx.fillStyle=C.lime;ctx.beginPath();ctx.arc((ax+nodeX-nodeR)/2,(ay+cy)/2,W*0.009,0,Math.PI*2);ctx.fill();
      // node circle
      ctx.beginPath();ctx.arc(nodeX,cy,nodeR,0,Math.PI*2);ctx.fillStyle=C.lime;ctx.fill();
      ctx.fillStyle=C.black;ctx.font="800 "+(nodeR*0.95)+"px Poppins";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(String(i+1),nodeX,cy+nodeR*0.03);ctx.textAlign="left";ctx.textBaseline="top";
      // label pill (lime fill, black text)
      ctx.font="700 "+(W*0.034)+"px Poppins";const lab=(items[i].t||"").toUpperCase();
      const labLines=wrapLines(ctx,lab,availW-W*0.05);let maxLW=0;for(const l of labLines)maxLW=Math.max(maxLW,ctx.measureText(l).width);
      const pw=Math.min(availW,maxLW+W*0.05),ph=labLines.length*W*0.034*1.14+W*0.020,py=cy-ph/2,pr=ph/2;
      ctx.fillStyle=C.lime;ctx.beginPath();ctx.moveTo(pillX+pr,py);ctx.arcTo(pillX+pw,py,pillX+pw,py+ph,pr);ctx.arcTo(pillX+pw,py+ph,pillX,py+ph,pr);ctx.arcTo(pillX,py+ph,pillX,py,pr);ctx.arcTo(pillX,py,pillX+pw,py,pr);ctx.closePath();ctx.fill();
      ctx.fillStyle=C.black;let ly=py+W*0.010;for(const l of labLines){ctx.fillText(l,pillX+W*0.025,ly);ly+=W*0.034*1.14;}
      // description under pill (white)
      if(items[i].d){ctx.font="400 "+(W*0.026)+"px Poppins";ctx.fillStyle=C.white;const dl=wrapLines(ctx,items[i].d,availW).slice(0,2);let dy=py+ph+W*0.010;for(const l of dl){ctx.fillText(l,pillX,dy);dy+=W*0.026*1.28;}}
    }
    // eyebrow top-left (over black, small)
    if(p.eyebrow){ctx.fillStyle=C.lime;ctx.font="600 "+(W*0.026)+"px Poppins";ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText((p.eyebrow||"").toUpperCase(),margin,margin+W*0.11/KASPECT+W*0.02);}
    footer(ctx,W,H,margin,C.white);
  }
  else if(tpl==="carousel"){
    const sl=(Array.isArray(p.slides)&&p.slides.length)?p.slides:[{h:p.headline||"",b:((p.caption||"").split("\n")[0]||"")}];
    const idx=Math.max(0,Math.min(slideIdx||0,sl.length-1));const cur=sl[idx],n=sl.length;
    kMark(ctx,W,margin,true);
    const dr=W*0.012,gap=W*0.045,dy=H*0.865;let dx=margin+dr;
    for(let i=0;i<n;i++){ctx.beginPath();ctx.arc(dx,dy,dr,0,Math.PI*2);ctx.fillStyle=i===idx?C.lime:"#3a3f46";ctx.fill();dx+=gap;}
    ctx.fillStyle="#8a8f98";ctx.font="600 "+(W*0.028)+"px Poppins";ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillText((idx+1)+" / "+n,W-margin,dy);ctx.textAlign="left";ctx.textBaseline="top";
    if(idx===0){
      let fs=W*0.076,lines;const topY=H*0.28,maxBot=H*0.70;
      for(;;){ctx.font="700 "+fs+"px Poppins";lines=wrapLines(ctx,(cur.h||"").toUpperCase(),W-2*margin);if(topY+lines.length*fs*1.1<=maxBot||fs<=W*0.042)break;fs*=0.93;}
      const lh=fs*1.1;drawAccentLines(ctx,lines,p.accent,margin,topY,lh,base,C.lime,"left",W);
      ctx.fillStyle=C.lime;ctx.font="700 "+(W*0.030)+"px Poppins";ctx.textBaseline="middle";
      ctx.fillText("SWIPE",margin,H*0.74);
      const sw=ctx.measureText("SWIPE").width,ax=margin+sw+W*0.03,ay=H*0.74;
      ctx.strokeStyle=C.lime;ctx.lineWidth=W*0.008;ctx.lineCap="round";ctx.lineJoin="round";
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+W*0.055,ay);ctx.moveTo(ax+W*0.036,ay-W*0.018);ctx.lineTo(ax+W*0.055,ay);ctx.lineTo(ax+W*0.036,ay+W*0.018);ctx.stroke();
      ctx.textBaseline="top";
    } else {
      let hfs=W*0.056,hlines;for(;;){ctx.font="700 "+hfs+"px Poppins";hlines=wrapLines(ctx,(cur.h||"").toUpperCase(),W-2*margin);if(hlines.length<=3||hfs<=W*0.038)break;hfs*=0.93;}
      const hlh=hfs*1.12;ctx.fillStyle=base;ctx.textBaseline="top";
      let y=H*0.20;for(const l of hlines){ctx.fillText(l,margin,y);y+=hlh;}
      if(cur.h)y+=W*0.03;
      const bfs=W*0.036,blh=bfs*1.45;ctx.font="400 "+bfs+"px Poppins";ctx.fillStyle=base;
      for(const para of (cur.b||"").split("\n")){if(!para.trim()){y+=blh*0.5;continue;}for(const l of wrapLines(ctx,para,W-2*margin)){ctx.fillText(l,margin,y);y+=blh;}y+=blh*0.3;}
    }
    footer(ctx,W,H,margin,base);}
  if(tpl!=="cta"&&tpl!=="split")drawCTApill(ctx,W,H,margin,p,!isLime);
}

function dayName(i){return["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][i];}
function buildCalendar(){const cal=document.getElementById("cal");cal.innerHTML="";
  state.forEach((p,i)=>{const d=document.createElement("div");d.className="day has";
    d.innerHTML=dayName(i%7)+"<b>"+p.template+"</b>";cal.appendChild(d);});}
function updateCounters(){cApproved.textContent=state.filter(p=>p.status==="approved").length;
  cChanges.textContent=state.filter(p=>p.status==="changes").length;
  cPending.textContent=state.filter(p=>p.status==="pending").length;}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function statusLabel(s){return s==="approved"?"Approved":s==="changes"?"Changes requested":"Pending review";}
function refreshStatus(p,card){card.querySelector('.dot').className='dot '+p.status;
  card.querySelector('#st_'+p.id).textContent=statusLabel(p.status);
  const note=card.querySelector('#note_'+p.id);note.textContent=p.changeNote||"";
  note.style.display=(p.status==="changes"&&p.changeNote)?"block":"none";updateCounters();}
function drawInto(p){const cv=document.getElementById("cv_"+p.id);if(cv)renderPoster(cv,p);}
function refreshCard(p,idx,card){const fresh=renderCard(p,idx);card.replaceWith(fresh);drawInto(p);refreshStatus(p,fresh);}
function renderCard(p,idx){const card=document.createElement("div");card.className="card";
  card.innerHTML=`
    <div class="preview"><canvas class="disp" id="cv_${p.id}"></canvas></div>
    <div class="body">
      <div class="row" style="justify-content:space-between">
        <div class="seg" data-k="template">${TEMPLATES.map(t=>`<button data-t="${t}" class="${p.template===t?'on':''}">${t}</button>`).join("")}</div>
        <div class="seg" data-k="ratio">
          <button data-r="square" class="${p.ratio!=='story'?'on':''}">1:1</button>
          <button data-r="story" class="${p.ratio==='story'?'on':''}">Story</button>
        </div>
      </div>
      <div><label class="fl">Headline / message</label><input class="f" data-f="headline" value="${esc(p.headline)}"></div>
      <div class="two">
        <div><label class="fl">Accent word / number</label><input class="f" data-f="accent" value="${esc(p.accent||'')}"></div>
        <div><label class="fl">CTA</label><input class="f" data-f="cta" value="${esc(p.cta||'')}"></div>
      </div>
      <div class="two">
        <div><label class="fl">Eyebrow</label><input class="f" data-f="eyebrow" value="${esc(p.eyebrow||'')}"></div>
        <div><label class="fl">Bullets (comma)</label><input class="f" data-f="bullets" value="${esc((p.bullets||[]).join(', '))}"></div>
      </div>
      <div><label class="fl">Caption</label><textarea class="f" data-f="caption">${esc(p.caption||'')}</textarea></div>
      <div class="status-line"><span class="dot ${p.status}"></span><span id="st_${p.id}">${statusLabel(p.status)}</span></div>
      <div class="changes-note" id="note_${p.id}">${esc(p.changeNote||'')}</div>
      <div class="actions">
        <button class="btn lime" data-act="approve">Approve</button>
        <button class="btn" data-act="changes">Request changes</button>
        <button class="btn ghost" data-act="caption">Copy caption</button>
        <button class="btn ghost" data-act="download">Download PNG</button>
      </div>
    </div>`;
  card.querySelectorAll('.seg[data-k="template"] button').forEach(b=>b.onclick=()=>{p.template=b.dataset.t;save();refreshCard(p,idx,card);});
  card.querySelectorAll('.seg[data-k="ratio"] button').forEach(b=>b.onclick=()=>{p.ratio=b.dataset.r;save();refreshCard(p,idx,card);});
  card.querySelectorAll('[data-f]').forEach(inp=>inp.oninput=()=>{const f=inp.dataset.f;
    if(f==="bullets")p.bullets=inp.value.split(",").map(s=>s.trim()).filter(Boolean);else p[f]=inp.value;
    save();drawInto(p);});
  card.querySelector('[data-act="approve"]').onclick=()=>{p.status="approved";p.changeNote="";save();refreshStatus(p,card);};
  card.querySelector('[data-act="changes"]').onclick=()=>{const n=prompt("What needs to change?",p.changeNote||"");if(n===null)return;
    p.status="changes";p.changeNote=n;save();refreshStatus(p,card);};
  card.querySelector('[data-act="caption"]').onclick=()=>{navigator.clipboard.writeText(p.caption||"").then(()=>toast("Caption copied"));};
  card.querySelector('[data-act="download"]').onclick=()=>downloadPNG(p);
  return card;}
function renderAll(){const grid=document.getElementById("grid");grid.innerHTML="";
  state.forEach((p,i)=>grid.appendChild(renderCard(p,i)));
  state.forEach(p=>{drawInto(p);if(p.status==="changes"&&p.changeNote){const n=document.getElementById("note_"+p.id);if(n)n.style.display="block";}});
  buildCalendar();updateCounters();}
function downloadPNG(p){const off=document.createElement("canvas");renderPoster(off,p);
  const a=document.createElement("a");a.download="boko_"+WEEK_KEY+"_"+p.id+"_"+(p.ratio||"square")+".png";
  a.href=off.toDataURL("image/png");a.click();}
let toastT;function toast(msg){let t=document.getElementById("__t");
  if(!t){t=document.createElement("div");t.id="__t";
    t.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#BFFC00;color:#000;font-weight:600;padding:10px 16px;border-radius:10px;z-index:99;font-size:13px";
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity=0,1400);}
if(document.fonts&&document.fonts.load){
  Promise.all([document.fonts.load("700 80px Poppins"),document.fonts.load("800 80px Poppins"),document.fonts.load("500 40px Poppins"),document.fonts.load("400 40px Poppins")])
    .then(()=>document.fonts.ready).then(renderAll).catch(renderAll);
}else{window.onload=renderAll;}
setTimeout(renderAll,700);
</script>
</body>
