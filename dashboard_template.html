<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boko Digital - Content Command Center</title>
<link rel="icon" type="image/svg+xml" href="__FAVICON__">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--lime:#BFFC00;--black:#000;--white:#FFF;--bg:#F8F9FC;--text:#101316;--muted:#5b6470;--line:#e4e7ee;--panel:#ffffff;--panel2:#ffffff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',system-ui,sans-serif;background:var(--bg);color:var(--text);}
  header.app{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 22px;border-bottom:1px solid var(--line);background:#ffffff;position:sticky;top:0;z-index:20;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand img{height:28px}
  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase}
  .topcount{display:flex;gap:8px;flex-wrap:wrap}
  .pill{font-size:12px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--text)}
  .pill b{color:#5a7a00}
  .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;flex-wrap:wrap}
  .toolbar h1{font-size:18px;margin:0;font-weight:700}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line);background:#fff;padding:6px 12px;border-radius:999px;cursor:pointer}
  .chip.on{background:var(--lime);color:#000;border-color:var(--lime)}
  .newbtn{font-family:inherit;font-weight:700;font-size:12px;border:1px solid var(--lime);background:var(--lime);color:#000;padding:7px 14px;border-radius:999px;cursor:pointer}
  .newbtn:hover{filter:brightness(.96)}
  .newbtn.gen{background:#000;color:var(--lime);border-color:#000}
  .newbtn.pub{background:#101316;color:var(--lime);border-color:#101316}
  .newbtn.ghostbtn{background:#fff;color:var(--text);border-color:var(--line)}
  .povl{position:fixed;inset:0;background:rgba(16,19,22,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .povl.show{display:flex}
  .pmodal{background:#fff;border:1px solid var(--line);border-radius:16px;width:min(720px,96vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(16,19,22,.25)}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
  .ptitle{font-weight:800;font-size:16px}
  .pclose{border:none;background:transparent;font-size:22px;line-height:1;cursor:pointer;color:var(--muted)}
  .pbar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line)}
  .pbar .fl{font-size:12px;color:var(--muted);font-weight:600;margin:0}
  .pcount{font-size:12px;color:var(--muted);margin-left:auto}
  .plist{padding:10px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
  .prow{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:11px;padding:10px 12px}
  .pmeta{flex:1;min-width:0}
  .pname{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .psub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .pdest{font-weight:600;color:#3a4048}
  .pacts{display:flex;gap:6px;flex-shrink:0}
  .pacts button{font-family:inherit;font-size:11px;font-weight:700;border-radius:8px;padding:6px 10px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--text)}
  .pacts .popen{background:var(--lime);border-color:var(--lime);color:#000}
  .pacts button:hover{filter:brightness(.97)}
  .pempty{padding:26px 8px;text-align:center;color:var(--muted);font-size:13px}
  .pfoot{padding:11px 18px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
  .cal{width:100%}
  .calhead{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
  .calhead div{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;padding-left:4px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .calgrid .day{background:#fff;border:1px solid var(--line);border-radius:10px;min-height:118px;padding:6px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .calgrid .day.out{background:#f2f3f6}
  .calgrid .day.today{border-color:var(--lime);box-shadow:0 0 0 1px var(--lime) inset}
  .calgrid .dnum{font-size:12px;font-weight:700;color:var(--text)}
  .calgrid .day.out .dnum{color:#c0c5cf}
  .calgrid .ev{font-size:11px;font-weight:600;color:var(--text);background:#f3f5f9;border-left:3px solid #888;border-radius:5px;padding:3px 6px;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .calgrid .day.dragover{border-color:var(--lime);box-shadow:0 0 0 1px var(--lime) inset;background:#f3fbe0}
  .calgrid .ev:hover{filter:brightness(.96)}
  .calgrid .more{font-size:10px;color:var(--muted)}
  .board{display:flex;gap:14px;padding:6px 22px 30px;overflow-x:auto;align-items:flex-start;min-height:60vh}
  .col{flex:0 0 300px;background:#eef0f5;border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;max-height:82vh}
  .col.drag{border-color:var(--lime);box-shadow:0 0 0 2px var(--lime) inset}
  .col h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin:0;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);color:#3a4048}
  .col h2 .n{color:var(--muted);font-weight:600}
  .col .cards{padding:11px;display:flex;flex-direction:column;gap:11px;overflow-y:auto}
  .card{flex:0 0 auto;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s;box-shadow:0 1px 2px rgba(16,19,22,.04)}
  .card:hover{border-color:#c7ccd6;box-shadow:0 4px 14px rgba(16,19,22,.08)}
  .card.dragging{opacity:.5}
  .thumb{background:#000;display:block}
  .thumb canvas{width:100%;height:auto;display:block}
  .cbody{padding:10px 11px 11px;display:flex;flex-direction:column;gap:7px}
  .activity{margin-top:4px}
  .alist{display:flex;flex-direction:column;gap:7px;max-height:150px;overflow-y:auto;margin-top:4px}
  .aitem{display:flex;gap:8px;align-items:flex-start;font-size:12px;color:var(--text)}
  .aav{flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#101316;color:var(--lime);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .atext{line-height:1.4}
  .atext .ctime{margin-left:6px;color:var(--muted);font-size:11px}
  .badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:6px;text-transform:uppercase}
  .badge.type{background:#e7f0fb;color:#1f6aa8}
  .badge.ig{background:#fce6f1;color:#c2186e}
  .badge.li{background:#e6eefc;color:#2456b8}
  .badge.fb{background:#e8ebfb;color:#2a3fa8}
  .badge.date{background:#eef0f5;color:#3a4048}
  .badge.date.od{background:#fdecea;color:#c0392b}
  .ctitle{font-size:13.5px;font-weight:600;line-height:1.3;color:var(--text)}
  .pillar{font-size:11px;color:var(--muted)}
  .cact{display:flex;gap:6px;margin-top:3px}
  .mini{font-family:inherit;font-size:11px;font-weight:600;border-radius:7px;padding:6px 9px;cursor:pointer;border:1px solid var(--line);background:#f3f5f9;color:var(--text)}
  .mini.ok{background:var(--lime);color:#000;border-color:var(--lime)}
  .mini.pubm{background:#101316;color:var(--lime);border-color:#101316}
  .mini.warn{color:#9a6a00;border-color:#f0d488;background:#fff7e3}
  .note{font-size:11px;color:#8a6a00;background:#fff7e3;border:1px solid #f0d488;border-radius:7px;padding:6px 8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .note span{flex:1;min-width:120px}
  .notedone{flex:0 0 auto;font-family:inherit;font-size:11px;font-weight:800;border:0;background:var(--lime);color:#000;border-radius:999px;padding:5px 14px;cursor:pointer;box-shadow:0 1px 6px rgba(191,252,0,.55);letter-spacing:.02em}
  .notedone:hover{filter:brightness(1.06);transform:translateY(-1px)}
  .notedone:active{transform:translateY(0)}
  .badge.cmt{background:#eef0f5;color:#3a4048}
  .comments{margin-top:6px;border-top:1px solid var(--line);padding-top:12px}
  .clabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .clist{display:flex;flex-direction:column;gap:11px;margin-bottom:10px;max-height:220px;overflow-y:auto}
  .cempty{font-size:12px;color:var(--muted)}
  .citem{display:flex;gap:8px}
  .cav{flex:0 0 auto;width:28px;height:28px;border-radius:50%;background:#e9d5ff;color:#7b3fbf;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
  .cavme{background:#f7c9e6;color:#b4267f}
  .hasimg{background-size:cover !important;background-position:center !important;color:transparent !important}
  .napic{display:flex;align-items:center;gap:10px;margin:4px 0 2px}
  .napicprev{width:44px;height:44px;border-radius:50%;background:#101316;color:var(--lime);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;background-size:cover;background-position:center;flex:0 0 auto}
  .napicrm{font-size:11px;color:#c0392b;cursor:pointer;font-weight:600}
  .cmeta{flex:1;min-width:0}
  .cauthor{font-size:12px;font-weight:700;color:var(--text)}
  .ctime{font-weight:500;color:var(--muted);font-size:11px;margin-left:6px}
  .ctext{font-size:13px;color:var(--text);line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .ctext a{color:#2456b8;text-decoration:underline;word-break:break-all}
  .cdel{margin-left:8px;font-size:10px;color:#c0392b;cursor:pointer;font-weight:600}
  .cimg{max-width:220px;max-height:200px;border-radius:8px;margin-top:6px;display:block;cursor:pointer;border:1px solid var(--line)}
  .cprev{margin-top:6px}
  .cprevwrap{position:relative;display:inline-block}
  .cprevwrap img{max-height:84px;border-radius:8px;border:1px solid var(--line);display:block}
  .cprevx{position:absolute;top:-7px;right:-7px;background:#222;color:#fff;border-radius:50%;width:18px;height:18px;line-height:18px;text-align:center;font-size:13px;cursor:pointer;user-select:none}
  .cattach{background:#fff;border:1px solid var(--line);color:var(--text);font-size:12px;padding:6px 10px;border-radius:8px;cursor:pointer;font-weight:600}
  .cbox{display:flex;gap:8px;align-items:flex-start}
  .cinput{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:#fff}
  .cinput textarea{width:100%;border:0;outline:0;resize:vertical;min-height:46px;font-family:inherit;font-size:13px;color:var(--text);background:transparent}
  .crow{display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:8px}
  .cnotify{font-size:11px;color:#7b3fbf}
  .crow .btn{padding:6px 16px;font-size:12px}
  .overlay{position:fixed;inset:0;background:rgba(16,19,22,.45);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.show{display:flex}
  .modal{background:#fff;border:1px solid var(--line);border-radius:16px;width:min(1160px,96vw);max-height:92vh;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:0;box-shadow:0 20px 60px rgba(16,19,22,.25)}
  @media(max-width:760px){.modal{grid-template-columns:1fr}}
  .mprev{background:#eef0f5;padding:18px;display:flex;align-items:flex-start;justify-content:center;border-right:1px solid var(--line)}
  .mprev canvas{width:100%;max-width:360px;height:auto;border-radius:10px;box-shadow:0 10px 34px rgba(16,19,22,.2)}
  .dualprev{display:flex;gap:12px;width:100%;align-items:flex-start}
  .pvcol{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
  .pvlab{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase}
  .pvcol canvas{width:100%;max-width:none;height:auto;border-radius:8px;box-shadow:0 8px 24px rgba(16,19,22,.18)}
  .mform{padding:18px;display:flex;flex-direction:column;gap:11px}
  .mform h3{margin:0;font-size:15px}
  label.fl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
  input.f,textarea.f,select.f{width:100%;background:#fff;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 10px;font-family:inherit;font-size:13px}
  textarea.f{resize:vertical;min-height:90px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seg{display:flex;flex-wrap:wrap;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .seg button{background:transparent;color:var(--muted);border:0;padding:6px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--lime);color:#000}
  .mactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;border-top:1px solid var(--line);padding-top:12px}
  .btn{font-family:inherit;font-weight:600;font-size:13px;border-radius:9px;padding:9px 13px;cursor:pointer;border:1px solid var(--line);background:#f3f5f9;color:var(--text)}
  .btn.lime{background:var(--lime);color:#000;border-color:var(--lime)}
  .btn.warn{color:#9a6a00;border-color:#f0d488;background:#fff7e3}
  .btn.ghost{background:#fff}
  .btn:hover{filter:brightness(.98)}
  .period{display:flex;align-items:center;gap:8px}
  .period h1{font-size:18px;margin:0;font-weight:700;min-width:150px;text-align:center}
  .navbtn{font-family:inherit;font-weight:700;font-size:14px;border:1px solid var(--line);background:#fff;color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer}
  .navbtn:hover{background:#eef0f5}
  .wsel{font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:8px;padding:6px 8px;cursor:pointer}
  .rightbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .fdiv{width:1px;height:20px;background:var(--line)}
  .slidenav{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:#eef0f5;border:1px solid var(--line);border-radius:9px;padding:7px 8px}
  .snbtn{font-family:inherit;font-size:12px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:7px;padding:6px 9px;cursor:pointer}
  .snbtn.add{background:var(--lime);border-color:var(--lime);color:#000}
  .snbtn.del{color:#c0392b;border-color:#e9b7b1}
  .slabel{font-size:12px;font-weight:700;color:var(--text);margin:0 4px}
  .badge.yt{background:#fde7e7;color:#c0202a}
  .badge.hs{background:#ffeede;color:#c2640f}
  .badge.story{background:#e7f7ec;color:#1f8a4c}
  .ethumb{width:100%;aspect-ratio:1/1;background:#fff;display:flex;flex-direction:column;padding:14px;gap:6px;overflow:hidden;border-bottom:1px solid var(--line)}
  .ethumb .elabel{align-self:flex-start;font-size:9px;font-weight:700;background:#ffeede;color:#c2640f;padding:2px 6px;border-radius:5px;text-transform:uppercase}
  .ethumb .esub{font-size:13px;font-weight:700;color:#101316;line-height:1.3}
  .ethumb .eprev{font-size:11px;color:#5b6470}
  .ethumb .ebody{font-size:11px;color:#3a4048;line-height:1.45;flex:1;overflow:hidden}
  .ethumb .esig{font-size:9px;color:#8a8f98;border-top:1px solid var(--line);padding-top:5px}
  .gmail{width:100%;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;font-family:Roboto,Arial,Helvetica,sans-serif;color:#202124}
  .gmail .gm-subj{font-size:18px;font-weight:500;padding:14px 16px 6px}
  .gmail .gm-row{display:flex;gap:10px;align-items:center;padding:2px 16px 12px;border-bottom:1px solid #eef0f3}
  .gmail .gm-av{width:36px;height:36px;border-radius:50%;background:#7b61ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex:0 0 auto}
  .gmail .gm-name{font-size:13px;font-weight:600;color:#202124}
  .gmail .gm-em{font-weight:400;color:#5f6368}
  .gmail .gm-to{font-size:12px;color:#5f6368}
  .gmail .gm-prev{font-size:12px;color:#5f6368;padding:8px 16px 0}
  .gmail .gm-body{padding:14px 16px 18px;font-size:14px;line-height:1.6;color:#202124}
  .gmail .gm-body p{margin:0 0 10px}
  .gmail .gm-body strong{font-weight:700}
  .ebtoolbar{display:flex;align-items:center;gap:6px;margin:0 0 5px;flex-wrap:wrap}
  .ebbold.ebu{text-decoration:underline}
  .ebbold.ebl{width:auto;padding:4px 10px;font-weight:700}
  .ebbold{font-weight:800;font-size:13px;width:30px;height:26px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;line-height:1}
  .ebbold:hover{background:#f3f3f3}
  .ebhint{font-size:11px;color:var(--muted)}
  .gmail .gm-sig{margin-top:16px}
  .gmail .gm-sig img{max-width:100%}
  .vthumb{position:relative;width:100%;aspect-ratio:1/1;background:#0c0e10;display:flex;align-items:center;justify-content:center}
  .vthumb .play{width:52px;height:52px;border-radius:50%;background:var(--lime);display:flex;align-items:center;justify-content:center}
  .vthumb .play:after{content:"";border-left:17px solid #000;border-top:10px solid transparent;border-bottom:10px solid transparent;margin-left:4px}
  .vthumb .vlabel{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;letter-spacing:.05em;color:#fff;background:rgba(255,255,255,.14);padding:3px 7px;border-radius:6px;text-transform:uppercase}
  .vthumb .vtitle{position:absolute;bottom:10px;left:12px;right:12px;font-size:13px;font-weight:600;color:#fff;line-height:1.25;z-index:1}
  .vthumb .vvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000}
  .vthumb .vpub{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;background:var(--lime);color:#000;padding:4px 8px;border-radius:6px;text-decoration:none;z-index:2}
  .vthumb a.play{cursor:pointer;text-decoration:none;z-index:2}
  .vplaywrap{position:relative;width:100%;padding-top:100%;border-radius:10px;overflow:hidden;background:#000}
  .vplaywrap iframe,.vplaywrap video{position:absolute;inset:0;width:100%;height:100%;border:0}
  .vplayfile{width:100%;border-radius:10px;background:#000;display:block}
  .vplaywrap .vposter{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
  .vplaywrap .vpblack{position:absolute;inset:0;background:#000}
  .vplaywrap .bigplay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:rgba(191,252,0,.96);z-index:2;box-shadow:0 4px 16px rgba(0,0,0,.3)}
  .vplaywrap .bigplay:after{content:"";position:absolute;left:55%;top:50%;transform:translate(-50%,-50%);border-left:22px solid #000;border-top:13px solid transparent;border-bottom:13px solid transparent}
  .vnote2{font-size:12px;color:#8a6a00;background:#fff7e3;border:1px solid #f0d488;border-radius:8px;padding:8px 10px;margin-top:8px}
  .vnote{font-size:12px;color:#5b6470;background:#f3f5f9;border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
  .confetti i{position:absolute;top:-16px;width:8px;height:13px;border-radius:2px;opacity:.95;animation:cfall var(--d,1.3s) cubic-bezier(.2,.6,.35,1) forwards}
  @keyframes cfall{to{transform:translateY(110vh) translateX(var(--x,0)) rotate(720deg)}}
  .gate{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:100}
  .gate.show{display:flex}
  .gatecard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:28px;width:min(360px,92vw);box-shadow:0 20px 60px rgba(16,19,22,.18);text-align:center}
  .gatecard img{height:30px;margin-bottom:14px}
  .gatecard h3{margin:0 0 14px;font-size:16px}

<script>
const LOGO_URL="__LOGO__";
const LOGO_LIGHT="__LOGOLIGHT__";
const K_WHITE="__KWHITE__";const K_BLACK="__KBLACK__";const K_LIME="__KLIME__";
const POSTS=__POSTS__;
const REFPOOL=__REFPOOL__;
const WEEK_KEY="__WEEK_KEY__";
const STORAGE="boko_board_"+WEEK_KEY;
const C={lime:"#BFFC00",black:"#000000",white:"#FFFFFF"};
const TEMPLATES=["statement","stat","cta","card","lime","checklist","quote","grid","index","split","founder","carousel","infographic"];
const DIMS={square:[1080,1080],story:[1080,1920]};
const KASPECT=1.046;
const STATUSES=[{id:"idea",label:"Idea"},{id:"drafting",label:"Drafting"},{id:"review",label:"Needs review"},{id:"approved",label:"Approved"},{id:"scheduled",label:"Scheduled"},{id:"published",label:"Published"}];
const PLATFORMS=["Instagram","LinkedIn","Facebook","YouTube","Hubspot"];
const EMAIL_SIG=__EMAILSIG__;
const FNAME_TAG={Hubspot:"{{ contact.firstname }}"};
function fname(text,platform){const tag=FNAME_TAG[platform];return tag?(text||"").replace(/\[\s*first[\s_]*name\s*\]/gi,tag):(text||"");}
let filter="All";let typeFilter="All";
const TYPE_FILTERS=[["All","All"],["Posts","Post"],["Reels","Reel"],["Carousels","Carousel"],["Infographics","Infographic"],["Emails","Email"]];
function kindOf(p){return p.platform==="Hubspot"?"Email":p.type==="video"?"Reel":p.template==="carousel"?"Carousel":p.template==="infographic"?"Infographic":"Post";}
function autoStory(p){return p.type!=="video"&&p.platform!=="Hubspot"&&(p.platform==="Instagram"||p.platform==="Facebook");}

document.getElementById("logo").src=LOGO_LIGHT;

let state=POSTS.map(p=>({...p}));
try{const saved=JSON.parse(localStorage.getItem(STORAGE)||"null");
  if(saved&&Array.isArray(saved)){state=saved.map(p=>({...p}));}}catch(e){}
let syncOn=false,PASS="",_pushT=null,_poll=null;
function save(){localStorage.setItem(STORAGE,JSON.stringify(state));if(syncOn){clearTimeout(_pushT);_pushT=setTimeout(pushServer,600);}}
function pushServer(){if(!syncOn)return;fetch('/api/state',{method:'POST',headers:{'Content-Type':'application/json','x-board-pass':PASS},body:JSON.stringify({state})}).catch(()=>{});}
function mergeServer(sv){return Array.isArray(sv)?sv.map(p=>({...p})):[];}
function setSyncDot(){const d=document.getElementById("syncdot");if(d)d.className="syncdot"+(syncOn?" on":"");}
function startPoll(){if(!syncOn||_poll)return;_poll=setInterval(()=>{if(document.getElementById('overlay').classList.contains('show'))return;
  fetch('/api/state',{headers:{'x-board-pass':PASS}}).then(r=>r.ok?r.json():null).then(d=>{if(d&&d.state){const m=mergeServer(d.state);
    if(JSON.stringify(m)!==JSON.stringify(state)){const oldMap={};state.forEach(o=>{oldMap[o.id]={status:o.status,clen:(o.comments||[]).length,cauthors:(o.comments||[]).map(c=>c.a)};});const me=commenterName();m.forEach(np=>{const old=oldMap[np.id];if(np.status==="approved"&&old&&old.status!=="approved")notifyApproved(np);if(old){const nc=np.comments||[];if(nc.length>old.clen){const involved=(np.creator&&np.creator===me)||(old.cauthors&&old.cauthors.indexOf(me)>=0);if(involved){for(let k=old.clen;k<nc.length;k++){const c=nc[k];if(c&&c.a!==me)notifyComment(np,c);}}}}});state=m;localStorage.setItem(STORAGE,JSON.stringify(state));renderBoard();}}}).catch(()=>{});},8000);}
function migrateHashtags(){let ch=false;state.forEach(p=>{if(p.platform!=="Hubspot"&&(p.hashtags===undefined||p.hashtags===null)){const t=(p.caption||"").match(/#[\w]+/g);p.hashtags=t?t.join(" "):"";if(t){p.caption=(p.caption||"").replace(/#[\w]+/g,"").replace(/[ \t]+/g," ").replace(/ *\n/g,"\n").replace(/\n{3,}/g,"\n\n").trim();}ch=true;}});if(ch)save();}
function afterLoad(){document.getElementById("gate").classList.remove("show");migrateHashtags();preloadAvatars(()=>{renderBoard();setSyncDot();startPoll();if(!localStorage.getItem("boko_user"))showNameGate();try{const _cid=new URLSearchParams(location.search).get("card");if(_cid&&state.find(p=>p.id===_cid))openEditor(_cid);}catch(e){}});}
function loadFrom(sv){state=mergeServer(sv);localStorage.setItem(STORAGE,JSON.stringify(state));pushServer();afterLoad();}
function offline(){syncOn=false;document.getElementById("offbanner").style.display="block";afterLoad();}
function showGate(msg){const g=document.getElementById("gate");document.getElementById("gerr").textContent=msg||"";g.classList.add("show");
  const inp=document.getElementById("gpass");inp.value="";setTimeout(()=>inp.focus(),50);}
function tryPass(p){fetch('/api/state',{headers:{'x-board-pass':p}}).then(r=>{
  if(r.status===401){localStorage.removeItem("boko_pass");showGate("Wrong passcode");return;}
  if(!r.ok){offline();return;}
  r.json().then(d=>{PASS=p;syncOn=true;localStorage.setItem("boko_pass",p);loadFrom(d.state);});
}).catch(()=>offline());}
function detectSync(){fetch('/api/state').then(r=>{
  if(r.status===401){const sp=localStorage.getItem("boko_pass");if(sp){tryPass(sp);}else{syncOn=true;showGate("");}}
  else if(r.ok){syncOn=true;r.json().then(d=>loadFrom(d.state));}
  else{offline();}
}).catch(()=>offline());}
document.getElementById("glogo").src=LOGO_LIGHT;
document.getElementById("gbtn").onclick=()=>{const p=document.getElementById("gpass").value.trim();if(!p){showGate("Enter the passcode");return;}tryPass(p);};
document.getElementById("gpass").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("gbtn").click();});
document.getElementById("glogo2").src=LOGO_LIGHT;
let _napicPending=null;
function _napicRender(av){const pv=document.getElementById("napicprev");const rm=document.getElementById("napicrm");if(!pv)return;if(av){pv.style.backgroundImage="url('"+av+"')";pv.textContent="";if(rm)rm.style.display="inline";}else{pv.style.backgroundImage="";pv.textContent=initials(document.getElementById("gname").value||commenterName());if(rm)rm.style.display="none";}}
function showNameGate(){const g=document.getElementById("namegate");g.classList.add("show");const i=document.getElementById("gname");i.value=localStorage.getItem("boko_user")||"";_napicPending=commenterAvatar()||null;_napicRender(_napicPending);setTimeout(()=>{i.focus();i.select();},60);}
function saveName(){const n=(document.getElementById("gname").value||"").trim();if(!n){document.getElementById("gnerr").textContent="Please enter your name";return;}localStorage.setItem("boko_user",n);if(_napicPending)localStorage.setItem("boko_avatar",_napicPending);else localStorage.removeItem("boko_avatar");document.getElementById("namegate").classList.remove("show");askNotify();}
(function(){const b=document.getElementById("napicbtn"),f=document.getElementById("napicfile"),rm=document.getElementById("napicrm");
  if(b&&f){b.onclick=()=>f.click();f.onchange=()=>{const fl=f.files[0];if(!fl||!/^image\//.test(fl.type||""))return;const r=new FileReader();r.onload=()=>squareThumb(r.result,80,d=>{_napicPending=d;_napicRender(d);});r.readAsDataURL(fl);f.value="";};}
  if(rm)rm.onclick=()=>{_napicPending=null;_napicRender(null);};
})();
document.getElementById("gnamebtn").onclick=saveName;
document.getElementById("gname").addEventListener("keydown",e=>{if(e.key==="Enter")saveName();});
document.getElementById("namegate").addEventListener("click",e=>{if(e.target.id==="namegate"&&localStorage.getItem("boko_user"))document.getElementById("namegate").classList.remove("show");});

const AVATARS={};
function preloadAvatars(cb){const urls=[...new Set(state.map(p=>p.avatar).filter(Boolean))];if(!urls.length){cb();return;}let n=0;urls.forEach(u=>{const im=new Image();im.onload=im.onerror=()=>{if(++n>=urls.length)cb();};im.src=u;AVATARS[u]=im;});}
let ready=0;const need=3;
const kWhite=new Image(),kBlack=new Image(),kLime=new Image();
function onReady(){ready++;if(ready>=need)boot();}
kWhite.onload=onReady;kBlack.onload=onReady;kLime.onload=onReady;
kWhite.src=K_WHITE;kBlack.src=K_BLACK;kLime.src=K_LIME;

__ENGINE__

/* ---------- board ---------- */
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],WK=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return "";const dt=new Date(d+"T00:00:00");if(isNaN(dt))return d;return WK[dt.getDay()]+" "+dt.getDate()+" "+MON[dt.getMonth()];}
function isOverdue(p){return p.date && p.date<todayStr() && p.status!=="published";}
function platClass(p){return p==="Instagram"?"ig":p==="LinkedIn"?"li":p==="YouTube"?"yt":p==="Hubspot"?"hs":"fb";}
let curMonth="",curWeek=null,_brd=null,curSlide=0,_openId=null,view="board";
function scheduleBoard(){clearTimeout(_brd);_brd=setTimeout(()=>{if(document.getElementById("overlay").classList.contains("show"))renderBoard();},450);}
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function ym(d){return (d||"").slice(0,7);}
function isoWeek(d){if(!d)return"";const dt=new Date(d+"T00:00:00");if(isNaN(dt))return"";const t=new Date(Date.UTC(dt.getFullYear(),dt.getMonth(),dt.getDate()));const day=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-day+3);const w1=new Date(Date.UTC(t.getUTCFullYear(),0,4));const w=1+Math.round(((t-w1)/864e5-3+((w1.getUTCDay()+6)%7))/7);return t.getUTCFullYear()+"-W"+String(w).padStart(2,"0");}
function weekMonday(wk){const [y,w]=wk.split("-W").map(Number);const s=new Date(Date.UTC(y,0,4));s.setUTCDate(s.getUTCDate()-((s.getUTCDay()+6)%7)+(w-1)*7);return s;}
function monthLabel(m){const[y,mm]=m.split("-");return MONTHS[+mm-1]+" "+y;}
function defaultMonth(){const c={};state.forEach(p=>{if(p.date)c[ym(p.date)]=(c[ym(p.date)]||0)+1;});let best="",n=-1;for(const k in c)if(c[k]>n){n=c[k];best=k;}return best||new Date().toISOString().slice(0,7);}
function shiftMonth(delta){const[y,m]=curMonth.split("-").map(Number);const d=new Date(y,m-1+delta,1);curMonth=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");curWeek=null;renderBoard();}
function dstr(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function monthWeeks(){const [Y,M]=curMonth.split("-").map(Number);const last=new Date(Y,M,0).getDate();
  const out=[];let n=1,day=1;
  while(day<=last){const sd=new Date(Y,M-1,day);const dow=(sd.getDay()+6)%7;let endDay=day+(6-dow);if(endDay>last)endDay=last;
    const ed=new Date(Y,M-1,endDay);out.push({n:n,start:sd,end:ed,key:dstr(sd)+".."+dstr(ed)});day=endDay+1;n++;}
  return out;}
function renderWeekSel(){const sel=document.getElementById("weekSel");const ws=monthWeeks();
  sel.innerHTML='<option value="">All weeks</option>'+ws.map(w=>{
    const a=w.start.getDate()+" "+MONTHS[w.start.getMonth()].slice(0,3),b=w.end.getDate()+" "+MONTHS[w.end.getMonth()].slice(0,3);
    return `<option value="${w.key}" ${curWeek===w.key?"selected":""}>Week ${w.n} (${a} - ${b})</option>`;}).join("");
  sel.onchange=()=>{curWeek=sel.value||null;renderBoard();};}
function visible(){return state.filter(p=>{
  if(filter!=="All"&&p.platform!==filter)return false;
  if(typeFilter!=="All"&&kindOf(p)!==typeFilter)return false;
  if(curWeek){const r=curWeek.split("..");return p.date&&p.date>=r[0]&&p.date<=r[1];}
  if(!p.date)return true;
  return ym(p.date)===curMonth;});}
function counts(){
  cTotal.textContent=state.length;
  cReview.textContent=state.filter(p=>p.status==="review").length;
  cApproved.textContent=state.filter(p=>p.status==="approved").length;
}
function renderFilters(){
  const ts=document.getElementById("typeSel");
  if(!ts.dataset.init){ts.dataset.init="1";ts.innerHTML=TYPE_FILTERS.map(([l,k])=>`<option value="${k}">${k==="All"?"All formats":l}</option>`).join("");ts.onchange=()=>{typeFilter=ts.value;renderBoard();};}
  ts.value=typeFilter;
  const ps=document.getElementById("platSel");
  if(!ps.dataset.init){ps.dataset.init="1";ps.innerHTML='<option value="All">All platforms</option>'+PLATFORMS.map(p=>`<option value="${p}">${p}</option>`).join("");ps.onchange=()=>{filter=ps.value;renderBoard();};}
  ps.value=filter;
}
function platColor(p){return p==="Instagram"?"#c2186e":p==="LinkedIn"?"#2456b8":p==="Facebook"?"#2a3fa8":p==="YouTube"?"#c0202a":p==="Hubspot"?"#c2640f":"#888";}
function renderCalendar(board){
  const cal=document.createElement("div");cal.className="cal";
  const head=document.createElement("div");head.className="calhead";
  ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach(d=>{const e=document.createElement("div");e.textContent=d;head.appendChild(e);});
  cal.appendChild(head);
  const grid=document.createElement("div");grid.className="calgrid";
  const [Y,M]=curMonth.split("-").map(Number);
  const first=new Date(Y,M-1,1);const startOffset=(first.getDay()+6)%7;
  const daysInMonth=new Date(Y,M,0).getDate();const start=new Date(Y,M-1,1-startOffset);
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  const evBy={};visible().forEach(p=>{if(p.date&&ym(p.date)===curMonth){(evBy[p.date]=evBy[p.date]||[]).push(p);}});
  const todayS=todayStr();
  for(let i=0;i<totalCells;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const inMonth=(d.getMonth()===M-1);
    const cell=document.createElement("div");cell.className="day"+(inMonth?"":" out")+(ds===todayS?" today":"");
    cell.addEventListener("dragover",ev=>{ev.preventDefault();cell.classList.add("dragover");});
    cell.addEventListener("dragleave",()=>cell.classList.remove("dragover"));
    cell.addEventListener("drop",ev=>{ev.preventDefault();cell.classList.remove("dragover");const id=ev.dataTransfer.getData("text/plain");const pp=state.find(x=>x.id===id);if(pp&&pp.date!==ds){pp.date=ds;save();renderBoard();toast("Moved");}});
    const num=document.createElement("div");num.className="dnum";num.textContent=d.getDate();cell.appendChild(num);
    if(inMonth){const evs=(evBy[ds]||[]).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
      evs.slice(0,4).forEach(p=>{const e=document.createElement("div");e.className="ev";e.style.borderLeftColor=platColor(p.platform);e.draggable=true;
        e.textContent=(p.time?p.time+" ":"")+p.title;e.title=p.title;e.onclick=()=>openEditor(p.id);e.addEventListener("dragstart",ev=>{ev.dataTransfer.setData("text/plain",p.id);ev.dataTransfer.effectAllowed="move";ev.stopPropagation();});cell.appendChild(e);});
      if(evs.length>4){const mo=document.createElement("div");mo.className="more";mo.textContent="+"+(evs.length-4)+" more";cell.appendChild(mo);}}
    grid.appendChild(cell);
  }
  cal.appendChild(grid);board.appendChild(cal);
}
function renderBoard(){
  if(!curMonth)curMonth=defaultMonth();
  document.getElementById("monthLabel").textContent=monthLabel(curMonth);
  renderWeekSel();renderFilters();counts();
  const board=document.getElementById("board");board.innerHTML="";
  if(view==="calendar"){renderCalendar(board);return;}
  STATUSES.forEach(st=>{
    const col=document.createElement("div");col.className="col";col.dataset.status=st.id;
    const items=visible().filter(p=>p.status===st.id);
    col.innerHTML=`<h2>${st.label} <span class="n">${items.length}</span></h2><div class="cards"></div>`;
    const cards=col.querySelector(".cards");
    items.forEach(p=>cards.appendChild(cardEl(p)));
    // drop zone
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drag");});
    col.addEventListener("dragleave",()=>col.classList.remove("drag"));
    col.addEventListener("drop",e=>{e.preventDefault();col.classList.remove("drag");
      const id=e.dataTransfer.getData("text/plain");const p=state.find(x=>x.id===id);
      if(p&&p.status!==st.id){p.status=st.id;logAct(p,"moved to "+st.label);if(st.id==="approved"){askNotify();notifyApproved(p);}state=state.filter(x=>x.id!==id);state.unshift(p);save();renderBoard();}});
    board.appendChild(col);
  });
}
function cardEl(p){
  const c=document.createElement("div");c.className="card";c.draggable=true;
  c.innerHTML=`<div class="thumb"></div>
    <div class="cbody">
      <div class="badges"><span class="badge type">${p.platform==="Hubspot"?"EMAIL":(p.type==="video"?"VIDEO":(p.template==="carousel"?"CAROUSEL":p.template==="infographic"?"INFOGRAPHIC":"POST"))}</span><span class="badge ${platClass(p.platform)}">${p.platform}</span>${p.date?`<span class="badge date ${isOverdue(p)?'od':''}">📅 ${fmtDate(p.date)}${p.time?" · "+p.time:""}</span>`:""}${autoStory(p)?'<span class="badge story">+STORY</span>':""}${(p.comments&&p.comments.length)?`<span class="badge cmt">💬 ${p.comments.length}</span>`:""}</div>
      <div class="ctitle">${esc(p.title)}</div>
      <div class="pillar">${esc(p.pillar||"")}</div>
      <div class="cact">
        <button class="mini" data-a="open">Open</button>
        ${p.status==="approved"?('<button class="mini pubm" data-a="publish">'+((p.date&&p.date<=todayStr())?'↑ Publish now':'↑ Schedule')+'</button>'):p.status==="scheduled"?'<button class="mini pubm" data-a="markpub">✓ Mark published</button>':(p.status==="published"?'':'<button class="mini ok" data-a="approve">Approve</button>')}
      </div>
    </div>`;
  if(p.platform==="Hubspot"){c.querySelector(".thumb").innerHTML=emailThumbHTML(p);}else if(p.type==="video"){c.querySelector(".thumb").innerHTML=videoThumbHTML(p);}else{const cv=document.createElement("canvas");c.querySelector(".thumb").appendChild(cv);renderPoster(cv,p);}
  c.addEventListener("dragstart",e=>{e.dataTransfer.setData("text/plain",p.id);c.classList.add("dragging");});
  c.addEventListener("dragend",()=>c.classList.remove("dragging"));
  c.addEventListener("click",e=>{if(e.target.closest("[data-a]"))return;openEditor(p.id);});
  {const op=c.querySelector('[data-a="open"]');if(op)op.onclick=()=>openEditor(p.id);}
  {const ap=c.querySelector('[data-a="approve"]');if(ap)ap.onclick=()=>{p.status="approved";p.changeNote="";logAct(p,"approved");askNotify();notifyApproved(p);save();renderBoard();confetti();toast("Approved");};}
  {const pb=c.querySelector('[data-a="publish"]');if(pb)pb.onclick=(e)=>{e.stopPropagation();pubOpen(p);const t=todayStr();if(p.date&&p.date<=t){p.status="published";logAct(p,"published");save();renderBoard();toast("Published — moved to Published");}else{p.status="scheduled";logAct(p,"scheduled");save();renderBoard();toast("Scheduled — moved to Scheduled");}};}
  {const mp=c.querySelector('[data-a="markpub"]');if(mp)mp.onclick=(e)=>{e.stopPropagation();p.status="published";logAct(p,"marked published");save();renderBoard();toast("Moved to Published");};}
  return c;
}

/* ---------- editor modal ---------- */
function isVideoFile(u){return /\.(mp4|webm|mov|m4v|ogg)(\?|$)/i.test(u||"");}
function ytId(u){const m=(u||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/))([\w-]{6,})/);return m?m[1]:null;}
function vimeoId(u){const m=(u||"").match(/vimeo\.com\/(?:video\/)?(\d+)/);return m?m[1]:null;}
function driveId(u){const m=(u||"").match(/drive\.google\.com\/file\/d\/([\w-]+)/);return m?m[1]:null;}
function imgSrc(u){if(!u)return"";const d=driveId(u);if(d)return"https://drive.google.com/thumbnail?id="+d+"&sz=w1000";return u;}
function embedSrc(u){const y=ytId(u);if(y)return"https://www.youtube.com/embed/"+y;const v=vimeoId(u);if(v)return"https://player.vimeo.com/video/"+v;const d=driveId(u);if(d)return"https://drive.google.com/file/d/"+d+"/preview";return null;}
function playEmbed(el){const src=el.getAttribute("data-embed");if(!src)return;const sep=src.indexOf("?")>=0?"&":"?";el.innerHTML=`<iframe src="${src}${sep}autoplay=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>`;el.onclick=null;el.style.cursor="default";}
function videoPlayerHTML(p){const u=p.videoUrl||p.publishedUrl||"";
  if(isVideoFile(u))return `<video class="vplayfile" ${p.thumbnail?`poster="${esc(imgSrc(p.thumbnail))}"`:""} src="${esc(u)}" controls playsinline></video>`;
  const e=embedSrc(u);
  if(e){const poster=imgSrc(p.thumbnail)||(ytId(u)?("https://img.youtube.com/vi/"+ytId(u)+"/hqdefault.jpg"):"");
    return `<div class="vplaywrap" data-embed="${esc(e)}" onclick="playEmbed(this)">${poster?`<img class="vposter" src="${esc(poster)}">`:'<div class="vpblack"></div>'}<span class="bigplay"></span></div>`;}
  return videoThumbHTML(p)+(u?'<div class="vnote2">This link can&#39;t be embedded. Use a YouTube, Vimeo, Google Drive, or direct .mp4 link to play it here.</div>':'<div class="vnote2">Paste a video link below to play it here.</div>');}
function videoThumbHTML(p){
  const u=p.videoUrl||p.publishedUrl||"";
  const pub=p.publishedUrl?'<span class="vpub">&#9654; Published</span>':'';
  if(isVideoFile(p.videoUrl)){return `<div class="vthumb"><span class="vlabel">${esc(p.platform)} &middot; Video</span><video class="vvid" ${p.thumbnail?`poster="${esc(imgSrc(p.thumbnail))}"`:""} src="${esc(p.videoUrl)}" controls playsinline preload="metadata" onclick="event.stopPropagation()"></video><span class="vtitle">${esc(p.title)}</span>${pub}</div>`;}
  const yid=ytId(u);
  const bg=p.thumbnail?`<img class="vvid" src="${esc(imgSrc(p.thumbnail))}" alt="">`:(yid?`<img class="vvid" src="https://img.youtube.com/vi/${yid}/hqdefault.jpg" alt="">`:"");
  return `<div class="vthumb">${bg}<span class="vlabel">${esc(p.platform)} &middot; Video</span><span class="play"></span><span class="vtitle">${esc(p.title)}</span>${pub}</div>`;
}
function emailThumbHTML(p){return `<div class="ethumb"><span class="elabel">Email &middot; Hubspot</span><div class="esub">${esc(fname(p.subject||p.title,p.platform))}</div>${p.preview?`<div class="eprev">${esc(p.preview)}</div>`:""}<div class="ebody">${mdBold(fname((p.body||p.caption||""),p.platform).slice(0,240))}</div><div class="esig">+ Maria Mendieta email signature (auto)</div></div>`;}
function gmailPreviewHTML(p){
  const subj=esc(fname(p.subject||p.title||"(no subject)",p.platform));
  const prev=esc(p.preview||"");
  const body=fname(p.body||p.caption||"",p.platform).split("\n").map(l=>l.trim()?("<p>"+mdBold(l)+"</p>"):"<br>").join("");
  return `<div class="gmail"><div class="gm-subj">${subj}</div>
    <div class="gm-row"><div class="gm-av">M</div><div><div class="gm-name">Maria Mendieta <span class="gm-em">&lt;maria@boko.com.au&gt;</span></div><div class="gm-to">to me</div></div></div>
    ${prev?`<div class="gm-prev">${prev}</div>`:""}
    <div class="gm-body">${body}<div class="gm-sig">${EMAIL_SIG}</div></div></div>`;
}
function copyEmail(p){
  const subj=fname(p.subject,p.platform);
  const rawBody=fname(p.body||p.caption||"",p.platform);
  const sigText=EMAIL_SIG.replace(/<br\s*\/?>/gi,"\n").replace(/<[^>]+>/g,"").replace(/&nbsp;/g," ").replace(/[ \t]+\n/g,"\n").replace(/\n{3,}/g,"\n\n").trim();
  const plain=(subj?("Subject: "+subj+"\n\n"):"")+rawBody.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,"$1 ($2)").replace(/\*\*([^*]+?)\*\*/g,"$1").replace(/__([^_]+?)__/g,"$1")+"\n\n"+sigText;
  const html=(subj?("<p><strong>Subject:</strong> "+esc(subj)+"</p>"):"")+emailBodyHTML(p)+EMAIL_SIG;
  try{
    if(window.ClipboardItem&&navigator.clipboard&&navigator.clipboard.write){
      const item=new ClipboardItem({"text/html":new Blob([html],{type:"text/html"}),"text/plain":new Blob([plain],{type:"text/plain"})});
      navigator.clipboard.write([item]).then(()=>toast("Email + signature copied (formatting kept)")).catch(()=>navigator.clipboard.writeText(plain).then(()=>toast("Email + signature copied")));
      return;
    }
  }catch(e){}
  navigator.clipboard.writeText(plain).then(()=>toast("Email + signature copied"));
}
function openEditor(id){
  const p=state.find(x=>x.id===id);if(!p)return;
  if(_openId!==id){curSlide=0;_openId=id;}
  if(p.platform==="YouTube")p.type="video";
  const isEmail=p.platform==="Hubspot";const isVid=p.type==="video"&&!isEmail;
  const isCarousel=(!isVid&&!isEmail&&p.template==="carousel");
  if(isCarousel){if(!Array.isArray(p.slides)||!p.slides.length)p.slides=[{h:p.headline||"",b:(p.caption||"").split("\n")[0]||""}];curSlide=Math.max(0,Math.min(curSlide,p.slides.length-1));}
  const m=document.getElementById("modal");
  m.innerHTML=`
    <div class="mprev">${isEmail?gmailPreviewHTML(p):isVid?videoPlayerHTML(p):(autoStory(p)?'<div class="dualprev"><div class="pvcol"><span class="pvlab">Feed 1:1</span><canvas id="mcv"></canvas></div><div class="pvcol"><span class="pvlab">Story 9:16</span><canvas id="mcvS"></canvas></div></div>':'<canvas id="mcv"></canvas>')}</div>
    <div class="mform">
      <div style="display:flex;align-items:center"><h3>${esc(p.title)}</h3><button class="x" data-a="close">&times;</button></div>
      ${(isEmail||p.platform==="YouTube")?'':`<div class="seg" id="typeseg"><button data-ty="post" class="${!isVid?'on':''}">Post</button><button data-ty="video" class="${isVid?'on':''}">Video</button></div>`}
      ${(isVid||isEmail)?'':`<div class="seg" id="tplseg">${TEMPLATES.map(t=>`<button data-t="${t}" class="${p.template===t?'on':''}">${t}</button>`).join("")}</div>`}
      <div class="two">
        <div><label class="fl">Status</label><select class="f" data-f="status2">${STATUSES.map(sx=>`<option value="${sx.id}" ${p.status===sx.id?'selected':''}>${sx.label}</option>`).join("")}</select></div>
        <div><label class="fl">Platform</label><select class="f" data-f="platform">${PLATFORMS.map(pl=>`<option ${p.platform===pl?'selected':''}>${pl}</option>`).join("")}</select></div>
      </div>
      <div class="two">
        <div><label class="fl">Scheduled date</label><input type="date" class="f" data-f="date" value="${p.date||''}"></div>
        <div><label class="fl">Time (AEST)</label><input type="time" class="f" data-f="time" value="${p.time||''}"></div>
      </div>
      <div><label class="fl">Title (internal)</label><input class="f" data-f="title" value="${esc(p.title)}"></div>
      ${isEmail?`
      <div><label class="fl">Subject line</label><input class="f" data-f="subject" value="${esc(p.subject||p.title||'')}"></div>
      <div><label class="fl">Preview text</label><input class="f" data-f="preview" value="${esc(p.preview||'')}"></div>
      <div><label class="fl">Body message</label><div class="ebtoolbar"><button type="button" class="ebbold" id="bbold" title="Bold (Ctrl+B)">B</button><button type="button" class="ebbold ebu" id="bul" title="Underline (Ctrl+U)">U</button><button type="button" class="ebbold ebl" id="blink" title="Insert link (Ctrl+K)">🔗 Link</button><span class="ebhint">Select text, then use the buttons or <b>Ctrl+B</b> / <b>Ctrl+U</b> / <b>Ctrl+K</b></span></div><textarea class="f" data-f="body" id="bodyfld" style="min-height:150px">${esc(p.body||p.caption||'')}</textarea></div>
      <div class="vnote">&#9993; Maria's HTML email signature is added automatically at the end of the body when you copy the email.</div>
      `:isVid?`<div class="vnote">&#127916; Video is uploaded manually${p.platform==="YouTube"?" to YouTube":""}. Paste a video link below to show it on the tile, and the published link once it's live.</div>
      <div class="two">
        <div><label class="fl">Video link (file / source)</label><input class="f" data-f="videoUrl" value="${esc(p.videoUrl||'')}" placeholder="https:// .mp4 or Drive/YouTube"></div>
        <div><label class="fl">Published link</label><input class="f" data-f="publishedUrl" value="${esc(p.publishedUrl||'')}" placeholder="https://youtu.be/..."></div>
      </div>
      <div><label class="fl">Thumbnail image URL</label><input class="f" data-f="thumbnail" value="${esc(p.thumbnail||'')}" placeholder="https:// .jpg / .png"></div>
      <div><label class="fl">Script / caption</label><textarea class="f" data-f="caption">${esc(p.caption||'')}</textarea></div>
      `:`
      ${autoStory(p)?`<div><label class="fl">CTA</label><input class="f" data-f="cta" value="${esc(p.cta||'')}"></div>`:`<div class="two">
        <div><label class="fl">Format</label><div class="seg" id="ratioseg"><button data-r="square" class="${p.ratio!=='story'?'on':''}">1:1</button><button data-r="story" class="${p.ratio==='story'?'on':''}">Story</button></div></div>
        <div><label class="fl">CTA</label><input class="f" data-f="cta" value="${esc(p.cta||'')}"></div>
      </div>`}
      ${autoStory(p)?`<div class="vnote">&#128241; Both <b>Feed 1:1</b> and <b>Story 9:16</b> are shown above and auto-included &mdash; Download exports both.</div>`:""}
      ${isCarousel?`
      <div class="slidenav">
        <button class="snbtn" data-sn="prev">&#9664;</button>
        <span class="slabel">Slide ${curSlide+1} / ${p.slides.length}</span>
        <button class="snbtn" data-sn="next">&#9654;</button>
        <button class="snbtn add" data-sn="add">+ Slide</button>
        <button class="snbtn del" data-sn="del">Delete slide</button>
      </div>
      <div><label class="fl">Slide ${curSlide+1} headline</label><input class="f" data-s="h" value="${esc((p.slides[curSlide]||{}).h||'')}"></div>
      <div><label class="fl">Slide ${curSlide+1} body text</label><textarea class="f" data-s="b" style="min-height:90px">${esc((p.slides[curSlide]||{}).b||'')}</textarea></div>
      <div><label class="fl">Accent word (cover)</label><input class="f" data-f="accent" value="${esc(p.accent||'')}"></div>
      `:`
      <div><label class="fl">Headline / message</label><input class="f" data-f="headline" value="${esc(p.headline)}"></div>
      <div><label class="fl">Subheadline (small body text)</label><textarea class="f" data-f="subhead" style="min-height:56px" placeholder="Optional supporting line — auto-sized to fit the design">${esc(p.subhead||'')}</textarea></div>
      <div class="two">
        <div><label class="fl">Accent word / number</label><input class="f" data-f="accent" value="${esc(p.accent||'')}"></div>
        <div><label class="fl">Eyebrow</label><input class="f" data-f="eyebrow" value="${esc(p.eyebrow||'')}"></div>
      </div>
      ${["checklist","grid","infographic"].includes(p.template)?`<div><label class="fl">Bullets (comma)${p.template==="infographic"?' — use "Label: description" per item':""}</label><input class="f" data-f="bullets" value="${esc((p.bullets||[]).join(', '))}"></div>`:""}
      `}
      <div><label class="fl">Caption</label><textarea class="f" data-f="caption">${esc(p.caption||'')}</textarea></div>`}
      ${isEmail?'':`<div><label class="fl">Hashtags</label><textarea class="f" data-f="hashtags" style="min-height:52px" placeholder="#AIAutomation #ShopifyAU">${esc(p.hashtags||'')}</textarea></div>`}
      <div class="activity">
        <div class="clabel">Activity</div>
        <div class="alist">${(p.log&&p.log.length)?p.log.slice(-8).reverse().map(l=>`<div class="aitem">${avEl("aav",l.a,l.av)}<span class="atext"><b>${esc(l.a||"Someone")}</b> ${esc(l.act)}<span class="ctime">${timeAgo(l.ts)}</span></span></div>`).join(""):'<div class="cempty">No activity yet.</div>'}</div>
      </div>
      <div class="comments">
        <div class="clabel">Comments</div>
        <div class="clist">${(p.comments&&p.comments.length)?p.comments.map((c,ci)=>`<div class="citem">${avEl("cav",c.a,c.av)}<div class="cmeta"><div class="cauthor">${esc(c.a||"Anon")}<span class="ctime">${timeAgo(c.ts)}</span><span class="cdel" data-del="${ci}">delete</span></div><div class="ctext">${linkify(c.t)}</div>${c.img?`<img class="cimg" src="${c.img}" data-full="${c.img}" alt="attachment">`:""}</div></div>`).join(""):'<div class="cempty">No comments yet.</div>'}</div>
        <div class="cbox">${avEl("cav cavme",commenterName()||"+",commenterAvatar())}<div class="cinput"><textarea id="cnew" placeholder="Add a comment... (paste an image with Ctrl+V)">${esc(localStorage.getItem("boko_cdraft_"+p.id)||"")}</textarea><div id="cprev" class="cprev"></div><div class="crow" style="justify-content:space-between"><button type="button" class="cattach" id="cattach">📎 Attach image</button><button class="btn lime" id="cbtn">Comment</button></div><input type="file" id="cfile" accept="image/*" style="display:none"></div></div>
      </div>
      <div class="mactions">
        <button class="btn lime" data-a="approve">Approve</button>
        <button class="btn ghost" data-a="copy">${isEmail?'Copy email':'Copy caption'}</button>
        ${(isVid||isEmail)?'':'<button class="btn ghost" data-a="download">Download PNG</button>'}
        ${(isVid&&p.thumbnail)?'<button class="btn ghost" data-a="thumbdl">Download thumbnail</button>':''}
        <button class="btn ghost" data-a="share">🔗 Share</button>
        <button class="btn" data-a="delete" style="color:#c0392b;border-color:#e9b7b1;background:#fff">Delete</button>
        <button class="btn lime" data-a="save" style="margin-left:auto">Save</button>
      </div>
    </div>`;
  const refreshPrev=()=>{const cv=m.querySelector("#mcv");
    if(cv){if(autoStory(p)){renderPoster(cv,Object.assign({},p,{ratio:"square"}),isCarousel?curSlide:0);const sC=m.querySelector("#mcvS");if(sC)renderPoster(sC,Object.assign({},p,{ratio:"story"}),isCarousel?curSlide:0);}else renderPoster(cv,p,isCarousel?curSlide:0);}
    else{const pv=m.querySelector(".mprev");if(pv)pv.innerHTML=isEmail?gmailPreviewHTML(p):isVid?videoPlayerHTML(p):"";}};
  refreshPrev();
  const ts=m.querySelector('#typeseg');if(ts)ts.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.type=b.dataset.ty;if(p.type==="video"&&(p.platform==="Hubspot"||p.platform==="Facebook"))p.platform="YouTube";save();openEditor(id);});
  const tplseg=m.querySelector('#tplseg');if(tplseg)tplseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.template=b.dataset.t;save();openEditor(id);});
  const ratioseg=m.querySelector('#ratioseg');if(ratioseg)ratioseg.querySelectorAll('button').forEach(b=>b.onclick=()=>{p.ratio=b.dataset.r;save();openEditor(id);});
  m.querySelectorAll('[data-sn]').forEach(b=>b.onclick=()=>{const a=b.dataset.sn;const N=p.slides.length;
    if(a==="prev")curSlide=Math.max(0,curSlide-1);
    else if(a==="next")curSlide=Math.min(N-1,curSlide+1);
    else if(a==="add"){p.slides.splice(curSlide+1,0,{h:"",b:""});curSlide++;}
    else if(a==="del"&&N>1){p.slides.splice(curSlide,1);curSlide=Math.min(curSlide,p.slides.length-1);}
    p.headline=p.slides[0].h;save();openEditor(id);scheduleBoard();});
  m.querySelectorAll('[data-s]').forEach(inp=>inp.oninput=()=>{p.slides[curSlide][inp.dataset.s]=inp.value;if(curSlide===0)p.headline=p.slides[0].h;save();refreshPrev();scheduleBoard();});
  m.querySelectorAll('[data-f]').forEach(inp=>{const f=inp.dataset.f;if(f==="status2"||f==="platform"||f==="date"||f==="time")return;
    inp.oninput=()=>{if(f==="bullets")p.bullets=inp.value.split(",").map(x=>x.trim()).filter(Boolean);else p[f]=inp.value;save();if(f!=="videoUrl"&&f!=="publishedUrl"&&f!=="thumbnail")refreshPrev();if(f==="title"||f==="subject"||f==="body")m.querySelector("h3").textContent=p.title;scheduleBoard();};});
  ["videoUrl","publishedUrl","thumbnail"].forEach(f=>{const el=m.querySelector('[data-f="'+f+'"]');if(el)el.onchange=()=>{refreshPrev();scheduleBoard();};});
  const bodyfld=m.querySelector("#bodyfld");
  function efWrap(pre,post,ph){if(!bodyfld)return;const s2=bodyfld.selectionStart,e2=bodyfld.selectionEnd,v=bodyfld.value;
    if(e2>s2){bodyfld.value=v.slice(0,s2)+pre+v.slice(s2,e2)+post+v.slice(e2);bodyfld.dispatchEvent(new Event("input"));bodyfld.focus();const np=e2+pre.length+post.length;bodyfld.setSelectionRange(np,np);}
    else{const ins=pre+ph+post;bodyfld.value=v.slice(0,s2)+ins+v.slice(s2);bodyfld.dispatchEvent(new Event("input"));bodyfld.focus();bodyfld.setSelectionRange(s2+pre.length,s2+pre.length+ph.length);}}
  function efLink(){if(!bodyfld)return;const s2=bodyfld.selectionStart,e2=bodyfld.selectionEnd,v=bodyfld.value;const sel=v.slice(s2,e2);
    let url=(prompt("Link URL:","https://")||"").trim();if(!url)return;if(!/^[a-z]+:|^\//i.test(url))url="https://"+url;
    const text=sel||((prompt("Link text:","")||"").trim())||url;const ins="["+text+"]("+url+")";
    bodyfld.value=v.slice(0,s2)+ins+v.slice(e2);bodyfld.dispatchEvent(new Event("input"));bodyfld.focus();const np=s2+ins.length;bodyfld.setSelectionRange(np,np);}
  {const b1=m.querySelector("#bbold");if(b1)b1.onclick=()=>efWrap("**","**","bold");}
  {const b2=m.querySelector("#bul");if(b2)b2.onclick=()=>efWrap("__","__","underline");}
  {const b3=m.querySelector("#blink");if(b3)b3.onclick=efLink;}
  if(bodyfld)bodyfld.addEventListener("keydown",e=>{if(!(e.ctrlKey||e.metaKey))return;const k=(e.key||"").toLowerCase();if(k==="b"){e.preventDefault();efWrap("**","**","bold");}else if(k==="u"){e.preventDefault();efWrap("__","__","underline");}else if(k==="k"){e.preventDefault();efLink();}});

  m.querySelectorAll('[data-f="platform"]').forEach(sel=>sel.onchange=()=>{p.platform=sel.value;if(p.platform==="Hubspot")p.type="post";if(p.platform==="YouTube")p.type="video";save();openEditor(id);scheduleBoard();});
  m.querySelectorAll('[data-f="status2"]').forEach(sel=>sel.onchange=()=>{p.status=sel.value;const _lbl=(STATUSES.find(x=>x.id===sel.value)||{}).label||sel.value;logAct(p,"moved to "+_lbl);if(sel.value==="approved"){askNotify();notifyApproved(p);}save();counts();scheduleBoard();});
  const dInp=m.querySelector('[data-f="date"]');if(dInp)dInp.onchange=()=>{p.date=dInp.value;save();scheduleBoard();};
  const tInp=m.querySelector('[data-f="time"]');if(tInp)tInp.onchange=()=>{p.time=tInp.value;save();scheduleBoard();};
  m.querySelector('[data-a="approve"]').onclick=()=>{p.status="approved";p.changeNote="";logAct(p,"approved");askNotify();notifyApproved(p);save();closeEditor();renderBoard();confetti();toast("Approved");};
  const cbtn=m.querySelector("#cbtn"),cnew=m.querySelector("#cnew"),cfile=m.querySelector("#cfile"),cattach=m.querySelector("#cattach"),cprev=m.querySelector("#cprev");
  if(cnew)cnew.addEventListener("input",()=>{const v=cnew.value;if(v.trim())localStorage.setItem("boko_cdraft_"+id,v);else localStorage.removeItem("boko_cdraft_"+id);});
  let pendImg=null;
  function shrinkImg(dataUrl,cb){const im=new Image();im.onload=()=>{let w=im.width,h=im.height,mx=1000;if(w>mx||h>mx){if(w>=h){h=Math.round(h*mx/w);w=mx;}else{w=Math.round(w*mx/h);h=mx;}}const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(im,0,0,w,h);try{cb(cv.toDataURL("image/jpeg",0.82));}catch(e){cb(dataUrl);}};im.onerror=()=>cb(dataUrl);im.src=dataUrl;}
  function setPend(dataUrl){shrinkImg(dataUrl,d=>{pendImg=d;cprev.innerHTML='<div class="cprevwrap"><img src="'+d+'"><span class="cprevx" title="Remove">\u00d7</span></div>';const x=cprev.querySelector(".cprevx");if(x)x.onclick=()=>{pendImg=null;cprev.innerHTML="";};});}
  function readImgFile(f){if(!f||!/^image\//.test(f.type||""))return;const r=new FileReader();r.onload=()=>setPend(r.result);r.readAsDataURL(f);}
  if(cattach)cattach.onclick=()=>cfile&&cfile.click();
  if(cfile)cfile.onchange=()=>{readImgFile(cfile.files[0]);cfile.value="";};
  if(cnew)cnew.addEventListener("paste",e=>{const items=(e.clipboardData&&e.clipboardData.items)||[];for(const it of items){if(it.type&&it.type.indexOf("image")===0){const f=it.getAsFile();if(f){e.preventDefault();readImgFile(f);return;}}}});
  m.querySelectorAll(".cimg").forEach(im=>im.onclick=()=>{const w=window.open("","_blank");if(w)w.document.write('<title>Attachment</title><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+im.dataset.full+'" style="max-width:100%;max-height:100vh"></body>');});
  if(cbtn)cbtn.onclick=()=>{const t=(cnew.value||"").trim();if(!t&&!pendImg)return;let nm=localStorage.getItem("boko_user");if(!nm){nm=((prompt("Your name (shown on comments):","")||"").trim())||"Anon";localStorage.setItem("boko_user",nm);}p.comments=p.comments||[];p.comments.push({a:nm,av:commenterAvatar(),t:t,img:pendImg||"",ts:Date.now()});localStorage.removeItem("boko_cdraft_"+id);logAct(p,"commented");askNotify();save();scheduleBoard();openEditor(id);};
  m.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm("Delete this comment?")){p.comments.splice(+b.dataset.del,1);save();scheduleBoard();openEditor(id);}});
  m.querySelector('[data-a="copy"]').onclick=()=>{if(isEmail)copyEmail(p);else{const tx=fname(p.caption||"",p.platform)+((p.hashtags||"").trim()?("\n\n"+p.hashtags.trim()):"");navigator.clipboard.writeText(tx).then(()=>toast("Copied"));}};
  const dl=m.querySelector('[data-a="download"]');if(dl)dl.onclick=()=>{if(isCarousel)downloadCarousel(p);else if(autoStory(p))downloadBoth(p);else downloadPNG(p);};
  const td=m.querySelector('[data-a="thumbdl"]');if(td)td.onclick=()=>downloadThumb(p);
  m.querySelectorAll('[data-a="close"]').forEach(b=>b.onclick=closeEditor);
  const sv=m.querySelector('[data-a="save"]');if(sv)sv.onclick=()=>{save();closeEditor();toast("Saved");};
  const sh=m.querySelector('[data-a="share"]');if(sh)sh.onclick=()=>{const url=location.origin+location.pathname+"?card="+encodeURIComponent(id);navigator.clipboard.writeText(url).then(()=>toast("Share link copied \u2014 opens this card")).catch(()=>prompt("Copy this share link:",url));};
  const del=m.querySelector('[data-a="delete"]');if(del)del.onclick=()=>{if(confirm("Delete this card?")){state=state.filter(x=>x.id!==id);save();closeEditor();renderBoard();toast("Deleted");}};
  document.getElementById("overlay").classList.add("show");
}

function pubCopy(p){if(p.platform==="Hubspot"){copyEmail(p);}else{const tx=fname(p.caption||"",p.platform)+((p.hashtags||"").trim()?("\n\n"+p.hashtags.trim()):"");navigator.clipboard.writeText(tx).then(()=>toast("Caption copied")).catch(()=>{});}}
function pubDownload(p){if(p.platform==="Hubspot")return;if(p.type==="video"){if(p.thumbnail)downloadThumb(p);return;}if(p.template==="carousel"){downloadCarousel(p);return;}if(autoStory(p)){downloadBoth(p);return;}downloadPNG(p);}
function pubOpen(p){const d=PUBDEST[p.platform];if(d&&d.url)window.open(d.url,"_blank","noopener");pubCopy(p);setTimeout(()=>pubDownload(p),120);toast("Opened "+(d?d.tool:"platform")+" — paste & schedule");}

function commenterName(){return localStorage.getItem("boko_user")||"";}
function commenterAvatar(){return localStorage.getItem("boko_avatar")||"";}
function squareThumb(dataUrl,size,cb){const im=new Image();im.onload=()=>{const s=Math.min(im.width,im.height);const cv=document.createElement("canvas");cv.width=cv.height=size;const cx=cv.getContext("2d");cx.drawImage(im,(im.width-s)/2,(im.height-s)/2,s,s,0,0,size,size);try{cb(cv.toDataURL("image/jpeg",0.7));}catch(e){cb(dataUrl);}};im.onerror=()=>cb(dataUrl);im.src=dataUrl;}
function avEl(cls,name,av){return av?('<div class="'+cls+' hasimg" style="background-image:url(\''+av+'\')"></div>'):('<div class="'+cls+'">'+esc(initials(name))+'</div>');}
function initials(n){const x=(n||"").trim().split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();return x||"?";}
function timeAgo(ts){if(!ts)return"";const s=Math.floor((Date.now()-ts)/1000);if(s<60)return"just now";const m=Math.floor(s/60);if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";}
function askNotify(){try{if(window.Notification&&Notification.permission==="default")Notification.requestPermission();}catch(e){}}
function notifyApproved(p){try{if(window.Notification&&Notification.permission==="granted"){const nn=new Notification("Approved \u2713 "+(p.title||"Post"),{body:(p.platform||"")+" \u00b7 "+kindOf(p)+((p.log&&p.log.length)?(" \u00b7 by "+p.log[p.log.length-1].a):""),icon:K_LIME,tag:"boko-appr-"+p.id});setTimeout(()=>{try{nn.close();}catch(e){}},7000);}}catch(e){}}
function logAct(p,act){p.log=p.log||[];p.log.push({a:(commenterName()||"Someone"),av:commenterAvatar(),act:act,ts:Date.now()});if(p.log.length>60)p.log=p.log.slice(-60);}
function notifyComment(p,c){try{if(window.Notification&&Notification.permission==="granted"){const nn=new Notification("\uD83D\uDCAC "+(c.a||"Someone")+" commented",{body:(p.title||"Card")+": "+((c.t||"").slice(0,90)||"(image)"),icon:K_LIME,tag:"boko-cmt-"+p.id+"-"+c.ts});setTimeout(()=>{try{nn.close();}catch(e){}},8000);}}catch(e){}}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function linkify(t){let h=esc(t);h=h.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');h=h.replace(/(^|[\s(])(www\.[^\s<]+)/g,'$1<a href="http://$2" target="_blank" rel="noopener">$2</a>');return h;}
function mdBold(s){let h=esc(s);h=h.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');h=h.replace(/\*\*([^*]+?)\*\*/g,"<strong>$1</strong>");h=h.replace(/__([^_]+?)__/g,"<u>$1</u>");return h;}
function emailBodyHTML(p){return fname(p.body||p.caption||"",p.platform).split("\n").map(l=>l.trim()?('<p style="margin:0 0 10px">'+mdBold(l)+"</p>"):"<br>").join("");}
function downloadPNG(p,si){const off=document.createElement("canvas");renderPoster(off,p,si||0);
  const a=document.createElement("a");a.download="boko_"+p.id+(si?("_s"+(si+1)):"")+"_"+(p.ratio||"square")+".png";a.href=off.toDataURL("image/png");a.click();}
function downloadCarousel(p){const n=(p.slides&&p.slides.length)?p.slides.length:1;const ratios=autoStory(p)?["square","story"]:["square"];const jobs=[];ratios.forEach(r=>{for(let i=0;i<n;i++)jobs.push([r,i]);});let k=0;
  (function nx(){if(k>=jobs.length)return;const[r,i]=jobs[k];const off=document.createElement("canvas");renderPoster(off,Object.assign({},p,{ratio:r}),i);const a=document.createElement("a");a.download="boko_"+p.id+"_"+r+"_s"+(i+1)+".png";a.href=off.toDataURL("image/png");a.click();k++;setTimeout(nx,600);})();}
function downloadAt(p,ratio){const off=document.createElement("canvas");const pp=Object.assign({},p,{ratio:ratio});renderPoster(off,pp,0);const a=document.createElement("a");a.download="boko_"+p.id+"_"+ratio+".png";a.href=off.toDataURL("image/png");a.click();}
function downloadBoth(p){downloadAt(p,"square");setTimeout(()=>downloadAt(p,"story"),500);}
async function downloadThumb(p){if(!p.thumbnail){toast("No thumbnail set");return;}
  try{const r=await fetch(p.thumbnail,{mode:"cors"});const b=await r.blob();const u=URL.createObjectURL(b);
    const ext=(p.thumbnail.split("?")[0].match(/\.(jpg|jpeg|png|webp|gif)$/i)||[,"jpg"])[1];
    const a=document.createElement("a");a.href=u;a.download="boko_"+p.id+"_thumbnail."+ext;a.click();setTimeout(()=>URL.revokeObjectURL(u),3000);toast("Thumbnail downloaded");}
  catch(e){window.open(p.thumbnail,"_blank");toast("Opened thumbnail");}}
function confetti(){const colors=["#BFFC00","#7b61ff","#1d9bf0","#ff9ad2","#000000","#ffffff"];
  const c=document.createElement("div");c.className="confetti";document.body.appendChild(c);
  for(let i=0;i<70;i++){const p=document.createElement("i");
    p.style.left=(Math.random()*100)+"vw";p.style.background=colors[i%colors.length];
    p.style.setProperty("--x",(Math.random()*220-110)+"px");p.style.setProperty("--d",(0.9+Math.random()*0.8)+"s");
    p.style.animationDelay=(Math.random()*0.15)+"s";c.appendChild(p);}
  setTimeout(()=>c.remove(),1900);}
let toastT;function toast(msg){let t=document.getElementById("__t");
  if(!t){t=document.createElement("div");t.id="__t";
    t.style.cssText="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#BFFC00;color:#000;font-weight:600;padding:10px 16px;border-radius:10px;z-index:99;font-size:13px";
    document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity=1;clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity=0,1400);}

function genPosts(){
  if(!REFPOOL||!REFPOOL.length){toast("No reference posts available");return;}
  let n=parseInt(prompt("How many posts to generate from the automation references?","3"),10);
  if(!n||n<1)return;n=Math.min(n,REFPOOL.length);
  const pool=REFPOOL.slice();
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=pool[i];pool[i]=pool[j];pool[j]=t;}
  const m=curMonth||new Date().toISOString().slice(0,7);const[Y,M]=m.split("-").map(Number);const last=new Date(Y,M,0).getDate();
  pool.slice(0,n).forEach((src,idx)=>{
    const p=JSON.parse(JSON.stringify(src));
    p.id="g"+Date.now().toString(36)+idx;p.status="idea";p.comments=[];p.changeNote="";p.creator=commenterName();
    p.date=m+"-"+String(1+Math.floor(Math.random()*last)).padStart(2,"0");
    state.push(p);
  });
  curWeek=null;save();renderBoard();toast(n+" post"+(n>1?"s":"")+" generated");
}
